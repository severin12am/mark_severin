<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Player Challenge: Tournament Edition</title>

<!-- Import Arcade/Brutalist Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
    /* =========================================
       NEO-BRUTALIST / INDIE ARCADE THEME (CSS)
       ========================================= */
    :root {
        /* UI Palette */
        --bg-color: #f4f0e6;      /* Off-white paper background */
        --panel-bg: #ffffff;      /* Pure white for panels */
        --text-main: #111111;     /* Stark black text */
        
        /* Game Palette (Matching the JS Theme below) */
        --accent-color: #FFE600;  /* Electric Yellow */
        --p1-color: #FF2A54;      /* Hot Red/Pink */
        --p2-color: #00E59B;      /* Mint Green */
        --p-cpu-color: #8C52FF;   /* Purple for CPU */
        
        /* Typography */
        --font-header: 'Bungee', cursive;
        --font-body: 'Space Grotesk', sans-serif;

        /* Brutalist Shadows */
        --shadow-heavy: 8px 8px 0px #000;
        --shadow-light: 4px 4px 0px #000;
        --border-thick: 4px solid #000;
    }

    body {
        margin: 0; padding: 0;
        background-color: var(--bg-color); 
        /* Subtle polka dot pattern for that indie feel */
        background-image: radial-gradient(#111 1px, transparent 1px);
        background-size: 24px 24px;
        color: var(--text-main);
        font-family: var(--font-body);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; overflow: hidden;
    }

    /* THE GAME CONSOLE */
    #game-container { 
        position: relative; 
        background: #1a1921; /* Dark bg for the canvas so game colors pop */
        border: 8px solid #000; 
        border-radius: 12px;
        box-shadow: 16px 16px 0px rgba(0,0,0,1); 
        overflow: hidden;
        /* Slight rotation on hover for fun tactile feel, restricted to main container */
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    canvas { 
        display: block; 
        background-color: transparent; 
    }

    /* OVERLAYS & MODALS */
    .overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.3); 
        backdrop-filter: blur(6px); /* Frosted glass effect over the game */
        z-index: 10;
    }

    /* The actual pop-up box inside overlays */
    .modal-box {
        background: var(--panel-bg);
        border: var(--border-thick);
        border-radius: 16px;
        box-shadow: var(--shadow-heavy);
        padding: 30px 40px;
        max-width: 500px;
        width: 85%;
        text-align: center;
        display: flex; flex-direction: column; align-items: center;
    }

    .hidden { display: none !important; }

    /* TYPOGRAPHY */
    h1 { 
        font-family: var(--font-header);
        font-size: 2.8rem; 
        margin: 0 0 15px 0; 
        color: var(--text-main); 
        text-transform: uppercase; 
        text-shadow: 3px 3px 0px var(--accent-color);
        line-height: 1.1;
    }
    h2 { 
        font-size: 1.4rem; 
        margin: 0 0 20px 0; 
        font-weight: 700;
    }
    p { 
        font-size: 1.1rem;
        margin-bottom: 20px; 
        font-weight: 500;
    }

    /* MENU LAYOUT */
    .menu-section { width: 100%; margin-bottom: 20px; }
    
    .mode-toggle { display: flex; gap: 12px; width: 100%; }
    .mode-toggle button { 
        flex: 1; 
        background: #fff;
    }
    
    /* Active State styling for mode toggle */
    .mode-toggle button#btn-1p.active { background: var(--p-cpu-color); color: #fff; }
    .mode-toggle button#btn-2p.active { background: var(--p2-color); color: #000; }

    .btn-tourney { 
        background: var(--accent-color); 
        font-size: 1.3rem; 
        padding: 18px; 
        width: 100%; 
        font-family: var(--font-header);
        letter-spacing: 1px;
    }

    .btn-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
        gap: 12px; 
        width: 100%; 
        max-height: 35vh; 
        overflow-y: auto; 
        padding-right: 15px; /* Room for custom scrollbar */
        padding-bottom: 5px;
        padding-top: 5px;
    }
    
    /* CHUNKY BUTTONS */
    button {
        background: #fff; 
        border: var(--border-thick); 
        padding: 12px 15px;
        font-family: var(--font-body);
        font-size: 1.1rem; 
        color: #000; 
        font-weight: 700; 
        cursor: pointer;
        border-radius: 8px; 
        box-shadow: var(--shadow-light);
        text-transform: uppercase;
        transition: all 0.1s ease-in-out;
    }
    
    /* Playful nth-child coloring for the game list to look super "indie" */
    .btn-grid button:nth-child(4n+1):hover { background: var(--p1-color); color: #fff; }
    .btn-grid button:nth-child(4n+2):hover { background: var(--p2-color); color: #000; }
    .btn-grid button:nth-child(4n+3):hover { background: var(--accent-color); color: #000; }
    .btn-grid button:nth-child(4n+4):hover { background: var(--p-cpu-color); color: #fff; }

    button:hover { 
        transform: translate(-2px, -2px); 
        box-shadow: 6px 6px 0px #000;
    }
    button:active { 
        transform: translate(4px, 4px); 
        box-shadow: 0px 0px 0px #000; /* Flatten the button */
    }
    
    .btn-secondary { background: #e0e0e0; }
    .btn-secondary:hover { background: #111; color: #fff; }
    
    .btn-large { grid-column: 1 / -1; padding: 18px; font-size: 1.2rem; }

    /* Neo-Brutalist Scrollbar */
    .btn-grid::-webkit-scrollbar { width: 14px; }
    .btn-grid::-webkit-scrollbar-track { 
        background: #fff; 
        border: 3px solid #000; 
        border-radius: 8px; 
    }
    .btn-grid::-webkit-scrollbar-thumb { 
        background: var(--text-main); 
        border: 2px solid #fff; 
        border-radius: 8px; 
    }

    /* HEADS UP DISPLAY (HUD) */
    #hud {
        position: absolute; top: 15px; left: 0; width: 100%;
        display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 5;
    }
    .hud-row { 
        display: flex; justify-content: space-between; width: 100%; 
        padding: 0 30px; box-sizing: border-box; 
        font-family: var(--font-header);
        font-size: 1.8rem; 
        /* Thick text stroke effect for readability over any game bg */
        text-shadow: 
            3px 3px 0 #000, -1px -1px 0 #000, 
            1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    }
    
    #game-title-display { color: #fff; }
    .score-p1 { color: var(--p1-color); }
    .score-p2 { color: var(--p2-color); }

    #tournament-hud { 
        font-family: var(--font-body);
        font-weight: 700;
        font-size: 1.1rem; 
        color: #000; 
        background: var(--accent-color); 
        padding: 6px 20px; 
        border: 3px solid #000;
        box-shadow: 3px 3px 0px #000;
        border-radius: 20px; 
        margin-top: 10px; 
        text-transform: uppercase;
    }

    #controls-hint {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: #fff; border: 3px solid #000; padding: 8px 20px;
        box-shadow: 4px 4px 0px #000; border-radius: 25px;
        font-family: var(--font-body); font-weight: 700; color: #000;
        pointer-events: none;
    }

    .tourney-standings { 
        font-family: var(--font-header);
        font-size: 2.2rem; 
        margin: 10px 0 25px 0; 
        background: #f4f0e6; 
        padding: 15px 30px; 
        border-radius: 12px; 
        border: var(--border-thick);
        box-shadow: inset 4px 4px 0px rgba(0,0,0,0.1);
        text-shadow: 2px 2px 0px #000;
    }
</style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <!-- HUD -->
    <div id="hud" class="hidden">
        <div class="hud-row">
            <span id="score-p1-display" class="score-p1">P1: 0</span>
            <span id="game-title-display">GAME NAME</span>
            <span id="score-p2-display" class="score-p2">P2: 0</span>
        </div>
        <div id="tournament-hud" class="hidden">Round 1/7 | Tourney: 0 - 0</div>
    </div>

    <!-- MAIN MENU SCREEN -->
    <div id="menu-screen" class="overlay">
        <div class="modal-box">
            <h1>2 Player<br>Challenge</h1>
            
            <!-- ROW 1: 1P / 2P Toggle -->
            <div class="menu-section mode-toggle">
                <button id="btn-1p" onclick="GameManager.setMode(true)">1 Player</button>
                <button id="btn-2p" onclick="GameManager.setMode(false)" class="active">2 Players</button>
            </div>

            <!-- ROW 2: Tournament Button -->
            <div class="menu-section">
                <button class="btn-tourney" onclick="GameManager.startTournament()">🏆 Start Tournament</button>
            </div>

            <!-- ROW 3: Game List -->
            <div class="menu-section btn-grid" id="menu-buttons">
                <!-- Game buttons injected here by JS -->
            </div>
        </div>
    </div>

    <!-- Regular Game Over Screen -->
    <div id="game-over-screen" class="overlay hidden">
        <div class="modal-box">
            <h1 id="winner-text">PLAYER 1 WINS!</h1>
            <h2 id="final-score">Final Score: 0 - 0</h2>
            <div class="menu-section mode-toggle">
                <button onclick="GameManager.restartGame()">Play Again</button>
                <button class="btn-secondary" onclick="GameManager.showMenu()">Main Menu</button>
            </div>
        </div>
    </div>

    <!-- Tournament Standings Screen -->
    <div id="tournament-screen" class="overlay hidden">
        <div class="modal-box">
            <h1 id="tourney-title">Round Over!</h1>
            <h2 id="tourney-subtitle">Player 1 won that game.</h2>
            <div class="tourney-standings">
                <span class="score-p1">P1: <span id="t-score-p1">0</span></span>
                <span style="color:#000; text-shadow:none; margin: 0 15px;">-</span>
                <span class="score-p2"><span id="t-p2-label">P2</span>: <span id="t-score-p2">0</span></span>
            </div>
            <div class="menu-section btn-grid" style="overflow-y: visible; max-height: none; padding-right: 0;">
                <button class="btn-large" style="background:var(--accent-color);" id="btn-next-round" onclick="GameManager.nextTournamentRound()">Next Game</button>
                <button class="btn-large btn-secondary" onclick="GameManager.showMenu()">Quit Tournament</button>
            </div>
        </div>
    </div>

    <!-- Pause Screen -->
    <div id="pause-screen" class="overlay hidden">
        <div class="modal-box">
            <h1>PAUSED</h1>
            <h2>Press ESC to resume</h2>
            <button class="btn-secondary" style="margin-top:20px; width:100%;" onclick="GameManager.showMenu()">Quit to Menu</button>
        </div>
    </div>

    <div id="controls-hint" class="hidden">P1: WASD | P2: Arrows</div>
</div>

<script>
/**
 * CENTRAL THEME CONFIGURATION
 * Updated to match our new vibrant Neo-Brutalist CSS palette.
 * Games drawing objects using Theme.p1, Theme.accent, etc., will pop!
 */
const Theme = {
    bg: '#1a1921',       // Dark background for canvas gameplay
    fg: '#ffffff',       // Lines, neutral objects
    p1: '#FF2A54',       // Vibrant Pink/Red
    p2: '#00E59B',       // Vibrant Mint Green
    accent: '#FFE600',   // Vibrant Yellow
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// -- INPUT HANDLER --
class InputHandler {
    constructor() {
        this.keys = {};
        window.addEventListener('keydown', e => {
            if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
            this.keys[e.code] = true;
            if (e.code === 'Escape') GameManager.togglePause();
        });
        window.addEventListener('keyup', e => { this.keys[e.code] = false; });
    }
    isDown(code) { return !!this.keys[code]; }
}
const Input = new InputHandler();

// -- BASE GAME CLASS --
class GameBase {
    constructor(name, description) {
        this.name = name; this.description = description;
        this.scoreP1 = 0; this.scoreP2 = 0;
        this.width = 800; this.height = 600;
    }
    init(w, h) { this.width = w; this.height = h; }
    update(dt) {}
    render(ctx) {}
}

// -- CORE ENGINE --
class GameEngine {
    constructor() {
        this.gamesList =[];
        this.currentGame = null;
        this.state = 'MENU'; // MENU, PLAYING, PAUSED, OVER, TOURNAMENT_UI
        this.lastTime = 0;
        
        // Settings
        this.isSinglePlayer = false; // Default to 2 Players
        this.isTournament = false;

        // Tournament State
        this.tGames =[];
        this.tRound = 0; // 0 to 6
        this.tScoreP1 = 0;
        this.tScoreP2 = 0;
    }

    registerGame(gameInstance) { this.gamesList.push(gameInstance); }

    start() {
        this.buildGameList();
        this.showMenu();
        requestAnimationFrame(t => this.loop(t));
    }

    setMode(isSingle) {
        this.isSinglePlayer = isSingle;
        if (isSingle) {
            document.getElementById('btn-1p').classList.add('active');
            document.getElementById('btn-2p').classList.remove('active');
        } else {
            document.getElementById('btn-2p').classList.add('active');
            document.getElementById('btn-1p').classList.remove('active');
        }
    }

    buildGameList() {
        const btns = document.getElementById('menu-buttons');
        btns.innerHTML = '';
        this.gamesList.forEach((g, index) => {
            const btn = document.createElement('button');
            btn.innerText = g.name;
            btn.onclick = () => {
                this.isTournament = false;
                this.startGame(index);
            };
            btns.appendChild(btn);
        });
    }

    showMenu() {
        this.state = 'MENU';
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('controls-hint').classList.add('hidden');
    }

    /** 
     * TOURNAMENT LOGIC 
     */
    startTournament() {
        this.isTournament = true;
        this.tScoreP1 = 0; this.tScoreP2 = 0; this.tRound = 0;
        
        // Pick 7 unique games randomly
        this.tGames = [];
        let available =[...Array(this.gamesList.length).keys()];
        for(let i=0; i<7; i++) {
            if(available.length === 0) available = [...Array(this.gamesList.length).keys()];
            let randIdx = Math.floor(Math.random() * available.length);
            this.tGames.push(available[randIdx]);
            available.splice(randIdx, 1);
        }
        
        this.nextTournamentRound();
    }

    nextTournamentRound() {
        if (this.tRound >= 7) {
            this.showMenu(); return;
        }
        let nextGameIdx = this.tGames[this.tRound];
        this.startGame(nextGameIdx);
    }

    /** 
     * CORE GAME FLOW 
     */
    startGame(index) {
        this.currentGame = this.gamesList[index];
        this.state = 'PLAYING';
        
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('controls-hint').classList.remove('hidden');
        
        document.getElementById('game-title-display').innerText = this.currentGame.name;
        
        let tHud = document.getElementById('tournament-hud');
        if (this.isTournament) {
            tHud.classList.remove('hidden');
            tHud.innerText = `Round ${this.tRound + 1}/7 | Tourney: P1 ${this.tScoreP1} - ${this.tScoreP2} ${this.isSinglePlayer?'CPU':'P2'}`;
        } else {
            tHud.classList.add('hidden');
        }

        this.updateHUD(); // Initial HUD set
        this.currentGame.init(canvas.width, canvas.height);
    }

    togglePause() {
        if (this.state === 'PLAYING') {
            this.state = 'PAUSED';
            document.getElementById('pause-screen').classList.remove('hidden');
        } else if (this.state === 'PAUSED') {
            this.state = 'PLAYING';
            document.getElementById('pause-screen').classList.add('hidden');
        }
    }

    gameOver(winner) {
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('controls-hint').classList.add('hidden');
        
        if (this.isTournament) {
            this.state = 'TOURNAMENT_UI';
            
            // Add points
            let winText = "Draw! No points awarded.";
            if (winner === 1) { this.tScoreP1++; winText = "Player 1 won the round!"; }
            else if (winner === 2) { 
                this.tScoreP2++; 
                winText = this.isSinglePlayer ? "CPU won the round!" : "Player 2 won the round!"; 
            }
            
            this.tRound++; // Advance round
            
            // Show Screen
            const tScreen = document.getElementById('tournament-screen');
            tScreen.classList.remove('hidden');
            document.getElementById('t-score-p1').innerText = this.tScoreP1;
            document.getElementById('t-score-p2').innerText = this.tScoreP2;
            
            let p2LabelElem = document.getElementById('t-p2-label');
            p2LabelElem.innerText = this.isSinglePlayer ? "CPU" : "P2";
            
            // Dynamic styling of HUD color based on mode
            if(this.isSinglePlayer) {
                p2LabelElem.parentElement.style.color = "var(--p-cpu-color)";
            } else {
                p2LabelElem.parentElement.style.color = "var(--p2-color)";
            }

            document.getElementById('tourney-subtitle').innerText = winText;

            // Check if tournament is completely over
            let nxtBtn = document.getElementById('btn-next-round');
            if (this.tRound >= 7) {
                document.getElementById('tourney-title').innerText = "TOURNAMENT COMPLETE";
                let finalWinner = "IT'S A TIE!";
                if (this.tScoreP1 > this.tScoreP2) finalWinner = "🏆 PLAYER 1 IS THE CHAMPION! 🏆";
                else if (this.tScoreP2 > this.tScoreP1) finalWinner = (this.isSinglePlayer ? "🏆 CPU" : "🏆 PLAYER 2") + " IS THE CHAMPION! 🏆";
                
                document.getElementById('tourney-subtitle').innerText = finalWinner;
                
                nxtBtn.innerText = "Finish Tournament";
                nxtBtn.onclick = () => this.showMenu();
            } else {
                document.getElementById('tourney-title').innerText = `Round ${this.tRound} Over!`;
                nxtBtn.innerText = "Start Next Game";
                nxtBtn.onclick = () => this.nextTournamentRound();
            }

        } else {
            // REGULAR GAME OVER
            this.state = 'OVER';
            const screen = document.getElementById('game-over-screen');
            const title = document.getElementById('winner-text');
            const scoreTxt = document.getElementById('final-score');
            
            screen.classList.remove('hidden');
            if (winner === 1) { 
                title.innerText = "PLAYER 1 WINS!"; 
                title.style.color = Theme.p1; 
                title.style.textShadow = "3px 3px 0px #000";
            } 
            else if (winner === 2) { 
                title.innerText = (this.isSinglePlayer ? "CPU WINS!" : "PLAYER 2 WINS!"); 
                title.style.color = this.isSinglePlayer ? "var(--p-cpu-color)" : Theme.p2; 
                title.style.textShadow = "3px 3px 0px #000";
            } 
            else { 
                title.innerText = "DRAW!"; 
                title.style.color = Theme.accent; 
                title.style.textShadow = "3px 3px 0px #000";
            }

            let s1 = this.currentGame.scoreP1 || 0;
            let s2 = this.currentGame.scoreP2 || 0;
            scoreTxt.innerText = `Final Score: ${s1} - ${s2}`;
        }
    }

    restartGame() {
        document.getElementById('game-over-screen').classList.add('hidden');
        this.startGame(this.gamesList.indexOf(this.currentGame)); // Restart current
    }

    updateHUD() {
        if (this.currentGame && this.state === 'PLAYING') {
            document.getElementById('score-p1-display').innerText = `P1: ${this.currentGame.scoreP1}`;
            let p2Label = this.isSinglePlayer ? "CPU: " : "P2: ";
            
            let p2Elem = document.getElementById('score-p2-display');
            p2Elem.innerText = `${p2Label}${this.currentGame.scoreP2}`;
            
            // Adjust P2 color dynamically if playing vs CPU
            if(this.isSinglePlayer) {
                p2Elem.style.color = "var(--p-cpu-color)";
            } else {
                p2Elem.style.color = "var(--p2-color)";
            }
        }
    }

    loop(timestamp) {
        const dt = (timestamp - this.lastTime) / 1000; 
        this.lastTime = timestamp;

        if (this.state === 'PLAYING') {
            ctx.fillStyle = Theme.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            this.currentGame.update(dt);
            this.currentGame.render(ctx);
            this.updateHUD();
        } else if (this.state !== 'PLAYING') {
             // Static background for menus/overlays inside the canvas
             ctx.fillStyle = Theme.bg;
             ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        requestAnimationFrame(t => this.loop(t));
    }
}

// Instantiate Engine
window.GameManager = new GameEngine();
</script>
