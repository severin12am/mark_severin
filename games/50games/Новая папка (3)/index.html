<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Player Challenge: Tournament Edition</title>
<style>
    /* =========================================
       CENTRAL THEME CONFIGURATION (CSS)
       ========================================= */
    :root {
        --bg-color: #1a1a1a;
        --text-color: #f0f0f0;
        --accent-color: #00d2ff;
        --p1-color: #ff4757;
        --p2-color: #2ed573;
        --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        margin: 0; padding: 0;
        background-color: var(--bg-color); color: var(--text-color);
        font-family: var(--font-main);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; overflow: hidden;
    }

    #game-container { position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 4px solid #333; }
    canvas { display: block; background-color: #000; }

    .overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.9); z-index: 10;
    }

    .hidden { display: none !important; }

    h1 { font-size: 2.5rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); text-align: center; }
    h2 { font-size: 1.5rem; margin-bottom: 20px; color: #fff; }
    p { max-width: 600px; text-align: center; margin-bottom: 20px; color: #ccc; line-height: 1.5; }

    /* MENU LAYOUT */
    .menu-section { width: 80%; max-width: 500px; margin-bottom: 20px; }
    
    .mode-toggle { display: flex; gap: 10px; width: 100%; }
    .mode-toggle button { flex: 1; padding: 15px; font-size: 1.2rem; background: #333; color: #fff; border: 2px solid #555; }
    .mode-toggle button.active { background: var(--accent-color); color: #000; border-color: var(--accent-color); }

    .btn-tourney { background: #ffd700; color: #000; font-size: 1.3rem; padding: 20px; border: 2px solid #fff; width: 100%; }

    .btn-grid { 
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
        width: 100%; max-height: 45vh; overflow-y: auto; padding-right: 10px;
    }
    
    button {
        background: var(--accent-color); border: none; padding: 15px 20px;
        font-size: 1.1rem; color: #000; font-weight: bold; cursor: pointer;
        border-radius: 4px; transition: transform 0.1s, filter 0.2s;
    }
    button:hover { filter: brightness(1.1); transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    
    .btn-secondary { background: #555; color: white; }
    .btn-large { grid-column: span 2; padding: 20px; font-size: 1.3rem; }

    /* Custom Scrollbar for game list */
    .btn-grid::-webkit-scrollbar { width: 8px; }
    .btn-grid::-webkit-scrollbar-track { background: #222; border-radius: 4px; }
    .btn-grid::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }

    /* HUD */
    #hud {
        position: absolute; top: 10px; left: 0; width: 100%;
        display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 5;
    }
    .hud-row { display: flex; justify-content: space-between; width: 100%; padding: 0 20px; box-sizing: border-box; font-size: 1.5rem; font-weight: bold; }
    #tournament-hud { font-size: 1rem; color: #ffd700; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 15px; margin-top: 5px; }
    
    .score-p1 { color: var(--p1-color); }
    .score-p2 { color: var(--p2-color); }

    #controls-hint {
        position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; font-size: 0.9rem; opacity: 0.7; pointer-events: none;
    }

    .tourney-standings { font-size: 2rem; margin: 20px 0; background: #222; padding: 20px; border-radius: 10px; border: 2px solid #555;}
</style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <!-- HUD -->
    <div id="hud" class="hidden">
        <div class="hud-row">
            <span id="score-p1-display" class="score-p1">P1: 0</span>
            <span id="game-title-display" style="color:var(--accent-color)">GAME NAME</span>
            <span id="score-p2-display" class="score-p2">P2: 0</span>
        </div>
        <div id="tournament-hud" class="hidden">Round 1/7 | Tourney: 0 - 0</div>
    </div>

    <!-- MAIN MENU SCREEN -->
    <div id="menu-screen" class="overlay">
        <h1>2 Player Challenge</h1>
        
        <!-- ROW 1: 1P / 2P Toggle -->
        <div class="menu-section mode-toggle">
            <button id="btn-1p" onclick="GameManager.setMode(true)">1 Player</button>
            <button id="btn-2p" onclick="GameManager.setMode(false)" class="active">2 Players</button>
        </div>

        <!-- ROW 2: Tournament Button -->
        <div class="menu-section">
            <button class="btn-tourney" onclick="GameManager.startTournament()">🏆 Start Tournament</button>
        </div>

        <!-- ROW 3: Game List -->
        <div class="menu-section btn-grid" id="menu-buttons">
            <!-- Game buttons injected here by JS -->
        </div>
    </div>

    <!-- Regular Game Over Screen -->
    <div id="game-over-screen" class="overlay hidden">
        <h1 id="winner-text">PLAYER 1 WINS!</h1>
        <p id="final-score"></p>
        <div class="menu-section mode-toggle">
            <button onclick="GameManager.restartGame()">Play Again</button>
            <button class="btn-secondary" onclick="GameManager.showMenu()">Main Menu</button>
        </div>
    </div>

    <!-- Tournament Standings Screen -->
    <div id="tournament-screen" class="overlay hidden">
        <h1 id="tourney-title">Round Over!</h1>
        <h2 id="tourney-subtitle">Player 1 won that game.</h2>
        <div class="tourney-standings">
            <span class="score-p1">P1: <span id="t-score-p1">0</span></span>
            <span style="color:#fff; margin: 0 20px;">-</span>
            <span class="score-p2"><span id="t-p2-label">P2</span>: <span id="t-score-p2">0</span></span>
        </div>
        <div class="menu-section btn-grid" style="overflow-y: visible; max-height: none;">
            <button class="btn-large" id="btn-next-round" onclick="GameManager.nextTournamentRound()">Next Game</button>
            <button class="btn-large btn-secondary" onclick="GameManager.showMenu()">Quit Tournament</button>
        </div>
    </div>

    <!-- Pause Screen -->
    <div id="pause-screen" class="overlay hidden">
        <h1>PAUSED</h1>
        <p>Press ESC to resume.</p>
        <button class="btn-secondary" onclick="GameManager.showMenu()">Quit to Menu</button>
    </div>

    <div id="controls-hint" class="hidden">P1: WASD | P2: Arrows</div>
</div>

<script>
/**
 * CENTRAL THEME CONFIGURATION
 */
const Theme = {
    bg: '#000000', fg: '#ffffff',
    p1: '#ff4757', p2: '#2ed573', accent: '#00d2ff',
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// -- INPUT HANDLER --
class InputHandler {
    constructor() {
        this.keys = {};
        window.addEventListener('keydown', e => {
            if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
            this.keys[e.code] = true;
            if (e.code === 'Escape') GameManager.togglePause();
        });
        window.addEventListener('keyup', e => { this.keys[e.code] = false; });
    }
    isDown(code) { return !!this.keys[code]; }
}
const Input = new InputHandler();

// -- BASE GAME CLASS --
class GameBase {
    constructor(name, description) {
        this.name = name; this.description = description;
        this.scoreP1 = 0; this.scoreP2 = 0;
        this.width = 800; this.height = 600;
    }
    init(w, h) { this.width = w; this.height = h; }
    update(dt) {}
    render(ctx) {}
}

// -- CORE ENGINE --
class GameEngine {
    constructor() {
        this.gamesList = [];
        this.currentGame = null;
        this.state = 'MENU'; // MENU, PLAYING, PAUSED, OVER, TOURNAMENT_UI
        this.lastTime = 0;
        
        // Settings
        this.isSinglePlayer = false; // Default to 2 Players
        this.isTournament = false;

        // Tournament State
        this.tGames = [];
        this.tRound = 0; // 0 to 6
        this.tScoreP1 = 0;
        this.tScoreP2 = 0;
    }

    registerGame(gameInstance) { this.gamesList.push(gameInstance); }

    start() {
        this.buildGameList();
        this.showMenu();
        requestAnimationFrame(t => this.loop(t));
    }

    setMode(isSingle) {
        this.isSinglePlayer = isSingle;
        if (isSingle) {
            document.getElementById('btn-1p').classList.add('active');
            document.getElementById('btn-2p').classList.remove('active');
        } else {
            document.getElementById('btn-2p').classList.add('active');
            document.getElementById('btn-1p').classList.remove('active');
        }
    }

    buildGameList() {
        const btns = document.getElementById('menu-buttons');
        btns.innerHTML = '';
        this.gamesList.forEach((g, index) => {
            const btn = document.createElement('button');
            btn.innerText = g.name;
            btn.onclick = () => {
                this.isTournament = false;
                this.startGame(index);
            };
            btns.appendChild(btn);
        });
    }

    showMenu() {
        this.state = 'MENU';
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('controls-hint').classList.add('hidden');
    }

    /** 
     * TOURNAMENT LOGIC 
     */
    startTournament() {
        this.isTournament = true;
        this.tScoreP1 = 0; this.tScoreP2 = 0; this.tRound = 0;
        
        // Pick 7 unique games randomly
        this.tGames = [];
        let available = [...Array(this.gamesList.length).keys()];
        for(let i=0; i<7; i++) {
            if(available.length === 0) available = [...Array(this.gamesList.length).keys()];
            let randIdx = Math.floor(Math.random() * available.length);
            this.tGames.push(available[randIdx]);
            available.splice(randIdx, 1);
        }
        
        this.nextTournamentRound();
    }

    nextTournamentRound() {
        if (this.tRound >= 7) {
            this.showMenu(); return;
        }
        let nextGameIdx = this.tGames[this.tRound];
        this.startGame(nextGameIdx);
    }

    /** 
     * CORE GAME FLOW 
     */
    startGame(index) {
        this.currentGame = this.gamesList[index];
        this.state = 'PLAYING';
        
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('controls-hint').classList.remove('hidden');
        
        document.getElementById('game-title-display').innerText = this.currentGame.name;
        
        let tHud = document.getElementById('tournament-hud');
        if (this.isTournament) {
            tHud.classList.remove('hidden');
            tHud.innerText = `Round ${this.tRound + 1}/7 | Tourney: P1 ${this.tScoreP1} - ${this.tScoreP2} ${this.isSinglePlayer?'CPU':'P2'}`;
        } else {
            tHud.classList.add('hidden');
        }

        this.updateHUD(); // Initial HUD set
        this.currentGame.init(canvas.width, canvas.height);
    }

    togglePause() {
        if (this.state === 'PLAYING') {
            this.state = 'PAUSED';
            document.getElementById('pause-screen').classList.remove('hidden');
        } else if (this.state === 'PAUSED') {
            this.state = 'PLAYING';
            document.getElementById('pause-screen').classList.add('hidden');
        }
    }

    gameOver(winner) {
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('controls-hint').classList.add('hidden');
        
        if (this.isTournament) {
            this.state = 'TOURNAMENT_UI';
            
            // Add points
            let winText = "Draw! No points awarded.";
            if (winner === 1) { this.tScoreP1++; winText = "Player 1 won the round!"; }
            else if (winner === 2) { 
                this.tScoreP2++; 
                winText = this.isSinglePlayer ? "CPU won the round!" : "Player 2 won the round!"; 
            }
            
            this.tRound++; // Advance round
            
            // Show Screen
            const tScreen = document.getElementById('tournament-screen');
            tScreen.classList.remove('hidden');
            document.getElementById('t-score-p1').innerText = this.tScoreP1;
            document.getElementById('t-score-p2').innerText = this.tScoreP2;
            document.getElementById('t-p2-label').innerText = this.isSinglePlayer ? "CPU" : "P2";
            document.getElementById('tourney-subtitle').innerText = winText;

            // Check if tournament is completely over
            let nxtBtn = document.getElementById('btn-next-round');
            if (this.tRound >= 7) {
                document.getElementById('tourney-title').innerText = "TOURNAMENT COMPLETE";
                let finalWinner = "IT'S A TIE!";
                if (this.tScoreP1 > this.tScoreP2) finalWinner = "🏆 PLAYER 1 IS THE CHAMPION! 🏆";
                else if (this.tScoreP2 > this.tScoreP1) finalWinner = (this.isSinglePlayer ? "🏆 CPU" : "🏆 PLAYER 2") + " IS THE CHAMPION! 🏆";
                
                document.getElementById('tourney-subtitle').innerText = finalWinner;
                
                nxtBtn.innerText = "Finish Tournament";
                nxtBtn.onclick = () => this.showMenu();
            } else {
                document.getElementById('tourney-title').innerText = `Round ${this.tRound} Over!`;
                nxtBtn.innerText = "Start Next Game";
                nxtBtn.onclick = () => this.nextTournamentRound();
            }

        } else {
            // REGULAR GAME OVER
            this.state = 'OVER';
            const screen = document.getElementById('game-over-screen');
            const title = document.getElementById('winner-text');
            const scoreTxt = document.getElementById('final-score');
            
            screen.classList.remove('hidden');
            if (winner === 1) { title.innerText = "PLAYER 1 WINS!"; title.style.color = Theme.p1; } 
            else if (winner === 2) { title.innerText = (this.isSinglePlayer ? "CPU WINS!" : "PLAYER 2 WINS!"); title.style.color = Theme.p2; } 
            else { title.innerText = "DRAW!"; title.style.color = Theme.accent; }

            let s1 = this.currentGame.scoreP1 || 0;
            let s2 = this.currentGame.scoreP2 || 0;
            scoreTxt.innerText = `Final Score: ${s1} - ${s2}`;
        }
    }

    restartGame() {
        document.getElementById('game-over-screen').classList.add('hidden');
        this.startGame(this.gamesList.indexOf(this.currentGame)); // Restart current
    }

    updateHUD() {
        if (this.currentGame && this.state === 'PLAYING') {
            document.getElementById('score-p1-display').innerText = `P1: ${this.currentGame.scoreP1}`;
            let p2Label = this.isSinglePlayer ? "CPU: " : "P2: ";
            document.getElementById('score-p2-display').innerText = `${p2Label}${this.currentGame.scoreP2}`;
        }
    }

    loop(timestamp) {
        const dt = (timestamp - this.lastTime) / 1000; 
        this.lastTime = timestamp;

        if (this.state === 'PLAYING') {
            ctx.fillStyle = Theme.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            this.currentGame.update(dt);
            this.currentGame.render(ctx);
            this.updateHUD();
        } else if (this.state !== 'PLAYING') {
             // Static background for menus/overlays
             ctx.fillStyle = Theme.bg;
             ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        requestAnimationFrame(t => this.loop(t));
    }
}

// Instantiate Engine
window.GameManager = new GameEngine();
</script>

<!-- ========================================================
     LOAD YOUR INDIVIDUAL GAME FILES HERE
     ======================================================== -->
<script src="games/pong.js"></script>
<script src="games/airhockey.js"></script>
<script src="games/snake.js"></script>
<script src="games/sumo.js"></script>
<script src="games/tanks.js"></script>
<script src="games/spaceduel.js"></script>
<script src="games/tugofwar.js"></script>
<script src="games/coinrush.js"></script>
<script src="games/flappy.js"></script>
<script src="games/dodge.js"></script>

<script>
    // Boot up the engine after all game scripts have loaded
    window.onload = () => { GameManager.start(); };
</script>
</body>
</html>
