<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Rotatris</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-overflow-scrolling:auto}
html,body{width:100%;height:100%;overflow:hidden;overscroll-behavior:none;-webkit-overscroll-behavior:none;background:#060612;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;position:fixed;top:0;left:0}
canvas{display:block}
.ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s;z-index:10}
.ov.h{opacity:0;pointer-events:none}
#ss{background:rgba(6,6,18,.97);overflow:hidden;overscroll-behavior:none;touch-action:none;padding:clamp(1em,4vh,2.5em) 0}
#go{background:rgba(6,6,18,.93)}
.tt{font-size:clamp(2.5em,10vw,5em);font-weight:900;letter-spacing:.15em;color:#fff;text-shadow:0 0 30px #00e5ff,0 0 60px #0088ff,0 0 120px #6600cc;margin-bottom:.1em}
.tl{display:inline-block;font-size:clamp(3em,12vw,6em);font-weight:900;letter-spacing:.05em;margin-bottom:.15em}
.tl span{display:inline-block;padding:0.02em 0.08em;margin:0 0.03em;border-radius:0.08em;font-family:'Segoe UI',system-ui,sans-serif;text-shadow:none;position:relative;top:0;animation:tBob 1.8s ease-in-out infinite}
@keyframes tBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#sndBtn{position:fixed;top:10px;right:10px;z-index:20;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);color:#889;border-radius:8px;padding:6px 12px;font-size:clamp(.7em,2vw,.9em);cursor:pointer;font-family:inherit;transition:background .15s}
#sndBtn:hover,#sndBtn:active{background:rgba(255,255,255,.14)}
#pau{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,6,18,.85);z-index:15;transition:opacity .25s}
#pau.h{opacity:0;pointer-events:none}
#pau .pt{font-size:clamp(2em,7vw,3.5em);font-weight:900;color:#fff;letter-spacing:.1em;margin-bottom:.5em;text-shadow:0 0 20px #00e5ff}
#pau .ps{color:#667;font-size:clamp(.8em,2.5vw,1em)}
.st{font-size:clamp(.75em,2.4vw,1.05em);color:#778;text-align:center;max-width:90%;line-height:1.8;margin:1.2em 0 2em}
.bt{font-size:clamp(1em,3vw,1.2em);padding:.7em 2.5em;border:2px solid #00e5ff;background:rgba(0,229,255,.06);color:#00e5ff;border-radius:10px;cursor:pointer;letter-spacing:.15em;font-weight:700;font-family:inherit;transition:background .15s}
.bt:active,.bt:hover{background:rgba(0,229,255,.22)}
.fs{font-size:clamp(1.5em,5vw,2.5em);color:#00e5ff;font-weight:700;margin:.5em 0 1.5em}
#ct{position:fixed;bottom:14px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:5;padding:0 12px}
#ct.h{display:none}
.ct-bar{display:flex;justify-content:space-between;align-items:flex-end;width:100%;max-width:520px;padding:0 8px;gap:12px}
.cg{display:flex;flex-direction:column;align-items:center;gap:6px}
.cg>span{font-size:clamp(11px,2.8vw,14px);color:#778;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.ch{font-size:clamp(13px,3.6vw,16px);line-height:1.45;text-align:center;letter-spacing:.01em;max-width:clamp(140px,38vw,200px);font-weight:500}
.ch-p{color:#d080e8}
.ch-s{color:#00bbdd}
.ch-auto{width:100%;max-width:min(94vw,380px);text-align:center;padding:0 8px;font-size:clamp(12px,3.2vw,15px);line-height:1.45;color:#00bbdd;font-weight:500}
.cr{display:flex;gap:8px}
.cb{width:clamp(52px,15vw,68px);height:clamp(52px,15vw,68px);border-radius:50%;border:2.5px solid;background:rgba(255,255,255,.04);color:#fff;font-size:clamp(1.1em,3.5vw,1.6em);font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s,transform .1s}
.cb:active{background:rgba(255,255,255,.16);transform:scale(.92)}
.modes{display:flex;flex-direction:column;align-items:center;gap:8px;margin:1em auto 1.5em;width:min(92vw,400px)}
.modes-btns{display:flex;gap:8px;justify-content:center;align-items:stretch;flex-wrap:wrap;width:100%}
.mlbl{color:#556;font-size:clamp(.7em,2vw,.85em);letter-spacing:.15em;text-transform:uppercase;font-weight:600;margin-bottom:2px;text-align:center;width:100%}
.md{flex:1 1 0;min-width:0;max-width:12em;text-align:center;font-size:clamp(.65em,2vw,.88em);padding:.45em .55em;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);color:#778;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit;transition:all .15s;letter-spacing:.04em}
.md.sel{border-color:#00e5ff;color:#00e5ff;background:rgba(0,229,255,.08);box-shadow:0 0 10px rgba(0,229,255,.15)}
.md:hover{background:rgba(255,255,255,.07)}
#ct.ctr .ct-bar{justify-content:center}
.bt2{border-color:#778;color:#889;background:rgba(255,255,255,.04)}
.bt2:active,.bt2:hover{background:rgba(255,255,255,.12)}
.brow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:1.2em}
.nb{color:#ffe640;font-size:clamp(1em,3vw,1.3em);font-weight:700;letter-spacing:.1em;margin-bottom:.8em;text-shadow:0 0 12px rgba(255,230,64,.4)}
.sndt{margin-top:1.2em;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.12);color:#889;border-radius:8px;padding:.4em 1.4em;font-size:clamp(.75em,2.2vw,.95em);cursor:pointer;font-family:inherit;font-weight:600;transition:background .15s;letter-spacing:.05em}
.sndt:hover,.sndt:active{background:rgba(255,255,255,.1)}
.lbw{margin-top:1.4em;width:90%;max-width:300px;text-align:center}
.lbb{color:#00e5ff;font-size:clamp(.9em,2.8vw,1.15em);font-weight:700;margin:.5em 0 .6em;letter-spacing:.08em}
.lbe{color:#aab;font-size:clamp(.7em,2vw,.85em);padding:3px 0;letter-spacing:.03em;display:flex;justify-content:space-between}
.lbe.me{color:#00e5ff;font-weight:700}
.lbno{color:#556;font-size:clamp(.7em,2vw,.82em);padding:6px 0;font-style:italic}
#flashHint{position:fixed;z-index:6;pointer-events:none;transform:translate(-50%,0);transition:opacity .2s ease-out}
#flashHint.h{display:none}
.fh-row{display:flex;gap:clamp(10px,3.5vw,20px);align-items:stretch;justify-content:center;flex-wrap:wrap}
.fh{background:rgba(8,10,26,.9);border-radius:12px;padding:10px 14px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.45)}
.fh-p{border:1.5px solid rgba(208,80,232,.55)}
.fh-s{border:1.5px solid rgba(0,229,255,.4)}
.fh-lbl{display:block;font-size:clamp(12px,3vw,15px);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.fh-p .fh-lbl{color:#e080f0}
.fh-s .fh-lbl{color:#00d4ee}
.fh-btns{display:block;font-size:clamp(22px,6vw,30px);font-weight:700;letter-spacing:.12em;line-height:1}
.fh-p .fh-btns{color:#d050ff}
.fh-s .fh-btns{color:#00e5ff}
.fh-keys{display:block;margin-top:5px;font-size:clamp(11px,2.8vw,13px);color:#889abb}
.fh-auto{display:block;font-size:clamp(11px,2.8vw,13px);color:#00c8e0;line-height:1.4;max-width:150px;margin:0 auto}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flashHint" class="flash-hint h">
<div class="fh-row">
<div class="fh fh-p">
<span class="fh-lbl" id="fhPieceLbl">Piece</span>
<span class="fh-btns">&#8634; &#8635;</span>
<span class="fh-keys" id="fhPieceKeys">Z / X</span>
</div>
<div class="fh fh-s" id="fhStructBox">
<span class="fh-lbl" id="fhStructLbl">Structure</span>
<span class="fh-btns" id="fhStructBtns">&#8634; &#8635;</span>
<span class="fh-keys" id="fhStructKeys">A / S</span>
<span class="fh-auto" id="fhStructAuto"></span>
</div>
</div>
</div>
<button id="sndBtn">&#128264; Sound ON</button>
<div id="ss" class="ov h">
<div class="tl" id="titleLetters"></div>
<div class="st" id="instructions"></div>
<div class="modes" id="modesel">
<div class="mlbl" id="modeLbl">MODE</div>
<div class="modes-btns">
<button class="md" data-mode="manual" id="mManual">Manual</button>
<button class="md sel" data-mode="gravity" id="mGravity">Gravity</button>
<button class="md" data-mode="auto" id="mAuto">Auto</button>
</div>
</div>
<button class="bt" id="pbtn">PLAY</button>
<button class="sndt" id="menuSnd">&#128264; Sound ON</button>
<div class="lbw" id="lbWrap">
<div class="mlbl" id="lbTitle">TOP SCORES</div>
<div class="lbb" id="lbBest">BEST: 0</div>
<div id="lbList"></div>
</div>
</div>
<div id="pau" class="h">
<div class="pt" id="pauseTitle">PAUSED</div>
<div class="ps" id="pauseSub">Press P or Esc to resume</div>
<div class="brow">
<button class="bt" id="resumeBtn">RESUME</button>
<button class="bt bt2" id="pauMenuBtn">MENU</button>
</div>
</div>
<div id="go" class="ov h">
<div class="tt" style="font-size:clamp(1.8em,6vw,3em)" id="gameOverTitle">GAME OVER</div>
<div class="fs" id="fsc"></div>
<div class="nb" id="newBest" style="display:none"></div>
<div class="brow">
<button class="bt" id="rbtn">PLAY AGAIN</button>
<button class="bt bt2" id="goMenuBtn">MENU</button>
</div>
</div>
<div id="ct" class="h">
<div class="ct-bar">
<div class="cg"><span id="pieceLbl">Piece</span>
<div class="ch ch-p" id="ctrlPiece"></div>
<div class="cr">
<button class="cb" style="border-color:#d050ff" id="bz">&#8634;</button>
<button class="cb" style="border-color:#d050ff" id="bx">&#8635;</button>
</div></div>
<div class="cg" id="structGrp"><span id="structLbl">Structure</span>
<div class="ch ch-s" id="ctrlStructManual"></div>
<div class="cr">
<button class="cb" style="border-color:#00e5ff" id="ba">&#8634;</button>
<button class="cb" style="border-color:#00e5ff" id="bs">&#8635;</button>
</div></div>
</div>
<div class="ch ch-s ch-auto" id="ctrlStructAuto"></div>
</div>
<script>
"use strict";

var STRINGS = {
  en: {
    title: "ROTATRIS", pageTitle: "Rotatris",
    soundOn: "Sound ON", soundOff: "Sound OFF",
    instManual: 'Build from the glowing center. Close a full ring to clear it.',
    instGravity: 'Build from the center. Structure rotates by gravity after each piece.',
    instAuto: 'Build from the center. Structure turns 90&deg; after each piece.',
    ctrlPiece: "&#8634; &#8635; or Z/X &middot; arrows move",
    ctrlStructManual: "&#8634; &#8635; or A/S",
    ctrlStructGravity: "Structure auto-rotates toward the heavy side",
    ctrlStructAuto: "Structure auto-rotates 90&deg; each piece",
    flashPieceKeys: "Z / X",
    flashStructKeys: "A / S",
    flashStructAutoG: "rotates by itself (gravity)",
    flashStructAutoA: "rotates 90&deg; by itself",
    modeLbl: "MODE", modeManual: "Manual", modeGravity: "Gravity", modeAuto: "Auto",
    play: "PLAY", paused: "PAUSED", pauseSub: "Press P or Esc to resume",
    gameOver: "GAME OVER", score: "SCORE", playAgain: "PLAY AGAIN",
    piece: "Piece", structure: "Structure", level: "LEVEL", rings: "RINGS", next: "NEXT",
    menu: "MENU", resume: "RESUME", best: "BEST", leaderboard: "TOP SCORES", newBest: "NEW BEST!", noScores: "Play to set a score!"
  },
  ru: {
    title: "\u041a\u0420\u0423\u0422\u0418\u0422\u0420\u0418\u0421", pageTitle: "\u041a\u0440\u0443\u0442\u0438\u0442\u0440\u0438\u0441",
    soundOn: "\u0417\u0432\u0443\u043a \u0412\u041a\u041b", soundOff: "\u0417\u0432\u0443\u043a \u0412\u042b\u041a\u041b",
    instManual: '\u0422\u0435\u0442\u0440\u0438\u0441 \u0432\u043e\u043a\u0440\u0443\u0433 \u0442\u043e\u0447\u043a\u0438.',
    instGravity: '\u0422\u0435\u0442\u0440\u0438\u0441 \u0432\u043e\u043a\u0440\u0443\u0433 \u0442\u043e\u0447\u043a\u0438. \u041a\u043e\u043d\u0441\u0442\u0440\u0443\u043a\u0446\u0438\u044f \u0441\u0430\u043c\u0430 \u0432\u0440\u0430\u0449\u0430\u0435\u0442\u0441\u044f.',
    instAuto: '\u0422\u0435\u0442\u0440\u0438\u0441 \u0432\u043e\u043a\u0440\u0443\u0433 \u0442\u043e\u0447\u043a\u0438. \u041f\u043e\u043b\u0435 \u0441\u0430\u043c\u043e +90\u00b0 \u043f\u043e\u0441\u043b\u0435 \u0444\u0438\u0433\u0443\u0440\u044b.',
    ctrlPiece: "&#8634; &#8635; \u0438\u043b\u0438 \u042f/\u0427 &middot; \u0441\u0442\u0440\u0435\u043b\u043a\u0438",
    ctrlStructManual: "&#8634; &#8635; \u0438\u043b\u0438 \u0424/\u042b",
    ctrlStructGravity: "\u041a\u043e\u043d\u0441\u0442\u0440\u0443\u043a\u0446\u0438\u044f \u0441\u0430\u043c\u0430 \u0432\u0440\u0430\u0449\u0430\u0435\u0442\u0441\u044f \u043a \u00ab\u0442\u044f\u0436\u0451\u043b\u043e\u0439\u00bb \u0441\u0442\u043e\u0440\u043e\u043d\u0435",
    ctrlStructAuto: "\u041a\u043e\u043d\u0441\u0442\u0440\u0443\u043a\u0446\u0438\u044f \u0441\u0430\u043c\u0430 \u0432\u0440\u0430\u0449\u0430\u0435\u0442\u0441\u044f \u043d\u0430 90\u00b0 \u043f\u043e\u0441\u043b\u0435 \u043a\u0430\u0436\u0434\u043e\u0439 \u0444\u0438\u0433\u0443\u0440\u044b",
    flashPieceKeys: "\u042f / \u0427",
    flashStructKeys: "\u0424 / \u042b",
    flashStructAutoG: "\u0441\u0430\u043c\u0430 \u0432\u0440\u0430\u0449\u0430\u0435\u0442\u0441\u044f (\u0433\u0440\u0430\u0432\u0438\u0442\u0430\u0446\u0438\u044f)",
    flashStructAutoA: "\u0441\u0430\u043c\u0430 \u0432\u0440\u0430\u0449\u0430\u0435\u0442\u0441\u044f \u043d\u0430 90\u00b0 \u043f\u043e\u0441\u043b\u0435 \u043a\u0430\u0436\u0434\u043e\u0439 \u0444\u0438\u0433\u0443\u0440\u044b",
    modeLbl: "\u0420\u0415\u0416\u0418\u041c", modeManual: "\u041e\u0431\u044b\u0447\u043d\u044b\u0439", modeGravity: "\u0413\u0440\u0430\u0432\u0438\u0442\u0430\u0446\u0438\u044f", modeAuto: "\u0410\u0432\u0442\u043e",
    play: "\u0418\u0413\u0420\u0410\u0422\u042c", paused: "\u041f\u0410\u0423\u0417\u0410", pauseSub: "\u041d\u0430\u0436\u043c\u0438\u0442\u0435 \u0417 \u0438\u043b\u0438 Esc \u0434\u043b\u044f \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0435\u043d\u0438\u044f",
    gameOver: "\u0418\u0413\u0420\u0410 \u041e\u041a\u041e\u041d\u0427\u0415\u041d\u0410", score: "\u0421\u0427\u0401\u0422", playAgain: "\u0418\u0413\u0420\u0410\u0422\u042c \u0421\u041d\u041e\u0412\u0410",
    piece: "\u0424\u0438\u0433\u0443\u0440\u0430", structure: "\u0421\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u0430", level: "\u0423\u0420\u041e\u0412\u0415\u041d\u042c", rings: "\u041a\u041e\u041b\u042c\u0426\u0410", next: "\u0421\u041b\u0415\u0414.",
    menu: "\u041c\u0415\u041d\u042e", resume: "\u041f\u0420\u041e\u0414\u041e\u041b\u0416\u0418\u0422\u042c", best: "\u041b\u0423\u0427\u0428\u0418\u0419", leaderboard: "\u0420\u0415\u041a\u041e\u0420\u0414\u042b", newBest: "\u041d\u041e\u0412\u042b\u0419 \u0420\u0415\u041a\u041e\u0420\u0414!", noScores: "\u0418\u0433\u0440\u0430\u0439\u0442\u0435, \u0447\u0442\u043e\u0431\u044b \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u044c \u0440\u0435\u043a\u043e\u0440\u0434!"
  },
};

var TITLE_BG = ["#00e5ff","#ff2050","#ffe640","#00e676","#d050ff","#ff9100","#448aff","#00e5ff","#ff2050"];
var TITLE_FG = ["#003844","#440010","#443800","#003818","#2a0044","#442400","#001844","#003844","#440010"];

var lang = "en", L = STRINGS.en;
(function() {
  var urlLang = new URLSearchParams(location.search).get("lang");
  if (urlLang && STRINGS[urlLang]) { lang = urlLang; L = STRINGS[lang]; }
})();
var ysdk = null, sdkPaused = false, userPausedBeforeSDK = false;
var gameReady = false;

var $$ = function(id) { return document.getElementById(id) };

function applyLang() {
  L = STRINGS[lang];
  document.title = L.pageTitle;
  document.documentElement.lang = lang;
  var tl = $$("titleLetters");
  tl.innerHTML = "";
  var chars = L.title.split("");
  for (var i = 0; i < chars.length; i++) {
    var s = document.createElement("span");
    s.textContent = chars[i];
    s.style.background = TITLE_BG[i % TITLE_BG.length];
    s.style.color = TITLE_FG[i % TITLE_FG.length];
    s.style.animationDelay = (i * 0.12) + "s";
    tl.appendChild(s);
  }
  var instKey = gameMode === "gravity" ? "instGravity" : gameMode === "auto" ? "instAuto" : "instManual";
  $$("instructions").innerHTML = L[instKey];
  $$("modeLbl").textContent = L.modeLbl;
  $$("mManual").textContent = L.modeManual;
  $$("mGravity").textContent = L.modeGravity;
  $$("mAuto").textContent = L.modeAuto;
  $$("pbtn").textContent = L.play;
  $$("pauseTitle").textContent = L.paused;
  $$("pauseSub").textContent = L.pauseSub;
  $$("resumeBtn").textContent = L.resume;
  $$("pauMenuBtn").textContent = L.menu;
  $$("gameOverTitle").textContent = L.gameOver;
  $$("rbtn").textContent = L.playAgain;
  $$("goMenuBtn").textContent = L.menu;
  $$("pieceLbl").textContent = L.piece;
  $$("structLbl").textContent = L.structure;
  $$("lbTitle").textContent = L.leaderboard;
  var sndLbl = soundOn ? "&#128264; " + L.soundOn : "&#128263; " + L.soundOff;
  $$("sndBtn").innerHTML = sndLbl;
  $$("menuSnd").innerHTML = sndLbl;
  updateCtrlHints();
}

function updateCtrlHints() {
  $$("ctrlPiece").innerHTML = L.ctrlPiece;
  $$("ctrlStructManual").innerHTML = L.ctrlStructManual;
  var isManual = gameMode === "manual";
  $$("ctrlStructAuto").innerHTML = gameMode === "gravity" ? L.ctrlStructGravity : L.ctrlStructAuto;
  $$("ctrlStructAuto").style.display = isManual ? "none" : "";
  if (state === "play") {
    $$("structGrp").style.display = isManual ? "" : "none";
    $$("ct").classList.toggle("ctr", !isManual);
  }
}

var flashHintT = 0;
var FLASH_HINT_DUR = 4;

function updateFlashHintPanel() {
  $$("fhPieceLbl").textContent = L.piece;
  $$("fhStructLbl").textContent = L.structure;
  $$("fhPieceKeys").textContent = L.flashPieceKeys;
  $$("fhStructKeys").textContent = L.flashStructKeys;
  var isManual = gameMode === "manual";
  $$("fhStructBtns").style.display = isManual ? "" : "none";
  $$("fhStructKeys").style.display = isManual ? "" : "none";
  $$("fhStructAuto").style.display = isManual ? "none" : "";
  $$("fhStructAuto").textContent = gameMode === "gravity" ? L.flashStructAutoG : L.flashStructAutoA;
}

function positionFlashHints() {
  if (flashHintT <= 0 || state !== "play") return;
  var cpx = ox + (CT + 0.5) * cs;
  var topY = oy + (CT + 0.5) * cs + cs * 2.2;
  var el = $$("flashHint");
  el.style.left = Math.round(cpx) + "px";
  el.style.top = Math.round(topY) + "px";
}

function showFlashHints() {
  flashHintT = FLASH_HINT_DUR;
  updateFlashHintPanel();
  positionFlashHints();
  var el = $$("flashHint");
  el.classList.remove("h");
  el.style.opacity = "1";
}

  cx.fillText(L.score, hx1, hy - cs * 1.4);
  cx.fillStyle = "#dde"; cx.font = "bold " + tb + "px system-ui";
  cx.fillText(score, hx1, hy - cs * 0.5);
  cx.fillStyle = "#556"; cx.font = ts + "px system-ui"; cx.textAlign = "right";
  cx.fillText(L.level, hx2, hy - cs * 1.4);
  cx.fillStyle = "#dde"; cx.font = "bold " + tb + "px system-ui";
  cx.fillText(level, hx2, hy - cs * 0.5);
  cx.fillStyle = "#556"; cx.font = ts + "px system-ui"; cx.textAlign = "center";
  cx.fillText(L.rings, ox + (CT + 0.5) * cs, hy - cs * 1.4);
  cx.fillStyle = "#dde"; cx.font = "bold " + tb + "px system-ui";
  cx.fillText(lines, ox + (CT + 0.5) * cs, hy - cs * 0.5);
  if (nextT !== undefined) {
    var nd = PDEFS[nextT], nk = nd.k;
    var npx = hx2 + cs * 1.2, npy = hy + cs * 0.5;
    if (npx + cs * 4 < W) {
      cx.fillStyle = "#445"; cx.font = Math.max(9, cs * 0.38) + "px system-ui"; cx.textAlign = "center";
      cx.fillText(L.next, npx + cs * 0.5, npy - cs * 0.4);
      var sz = cs * 0.75;
      for (var i = 0; i < nd.c.length; i++) {
        var bpx = npx + nd.c[i][1] * sz, bpy = npy + nd.c[i][0] * sz;
        cx.globalAlpha = 0.85; cx.shadowColor = nk; cx.shadowBlur = sz * 0.3; cx.fillStyle = nk;
        cx.fillRect(bpx + 1, bpy + 1, sz - 2, sz - 2); cx.shadowBlur = 0; cx.globalAlpha = 1;
      }
    }
  }
}

keys = {}; softDrop = false;
function togglePause() {
  if (state !== "play" && !paused) return;
  paused = !paused;
  $$("pau").classList.toggle("h", !paused);
  if (!paused) { softDrop = false; if (ysdk) ysdk.features.GameplayAPI?.start(); }
  else { if (ysdk) ysdk.features.GameplayAPI?.stop(); }
}
window.addEventListener("keydown", function(e) {
  if (e.code === "Space" || e.code === "ArrowUp" || e.code === "ArrowDown" || e.code === "ArrowLeft" || e.code === "ArrowRight") e.preventDefault();
  if (state === "start") { if (gameReady) startGame(); return; }
  if (state === "over" && (e.code === "Space" || e.code === "Enter")) { showAdThen(function() { startGame(); }); return; }
  if ((e.code === "KeyP" || e.code === "Escape") && (state === "play" || paused)) { togglePause(); return; }
  if (state !== "play" || paused) return;
  if (e.repeat && (e.code === "KeyZ" || e.code === "KeyX" || e.code === "KeyA" || e.code === "KeyS" || e.code === "Space" || e.code === "ArrowUp")) return;
  keys[e.code] = true;
  if (e.code === "ArrowLeft") moveH(-1);
  else if (e.code === "ArrowRight") moveH(1);
  else if (e.code === "ArrowDown") softDrop = true;
  else if (e.code === "ArrowUp" || e.code === "Space") hardDrop();
  else if (e.code === "KeyZ") rotatePiece(-1);
  else if (e.code === "KeyX") rotatePiece(1);
  else if (e.code === "KeyA" && gameMode === "manual") rotateStruct(-1);
  else if (e.code === "KeyS" && gameMode === "manual") rotateStruct(1);
});
window.addEventListener("keyup", function(e) {
  keys[e.code] = false;
  if (e.code === "ArrowDown") softDrop = false;
});
var dasT = {l: 0, r: 0};
function updateDAS(dt) {
  if (state !== "play" || !piece || sRotating) return;
  var sides = [["ArrowLeft", -1, "l"], ["ArrowRight", 1, "r"]];
  for (var i = 0; i < sides.length; i++) {
    var k = sides[i][0], d = sides[i][1], s = sides[i][2];
    if (keys[k]) {
      dasT[s] += dt * 1000;
      if (dasT[s] > 150) {
        var a = dasT[s] - 150, pa = a - dt * 1000;
        var tk = Math.floor(a / 40) - Math.max(0, Math.floor(pa / 40));
        for (var j = 0; j < tk; j++) moveH(d);
      }
    } else dasT[s] = 0;
  }
}

function addBtn(id, fn) {
  $$(id).addEventListener("pointerdown", function(e) { e.preventDefault(); fn(); });
}
addBtn("bz", function() { rotatePiece(-1) });
addBtn("bx", function() { rotatePiece(1) });
addBtn("ba", function() { rotateStruct(-1) });
addBtn("bs", function() { rotateStruct(1) });
$$("pbtn").addEventListener("pointerdown", function(e) { e.preventDefault(); if (gameReady) startGame(); });
$$("rbtn").addEventListener("pointerdown", function(e) { e.preventDefault(); showAdThen(function() { startGame(); }); });
$$("resumeBtn").addEventListener("pointerdown", function(e) { e.preventDefault(); togglePause(); });
$$("pauMenuBtn").addEventListener("pointerdown", function(e) { e.preventDefault(); goToMenu(); });
$$("goMenuBtn").addEventListener("pointerdown", function(e) { e.preventDefault(); showAdThen(function() { goToMenu(); }); });
var modeBtns = [$$("mManual"), $$("mGravity"), $$("mAuto")];
function selectMode(mode) {
  gameMode = mode;
  for (var i = 0; i < modeBtns.length; i++) modeBtns[i].classList.toggle("sel", modeBtns[i].dataset.mode === mode);
  var instKey = mode === "gravity" ? "instGravity" : mode === "auto" ? "instAuto" : "instManual";
  $$("instructions").innerHTML = L[instKey];
  updateCtrlHints();
}
for (var mi = 0; mi < modeBtns.length; mi++) (function(btn) {
  btn.addEventListener("pointerdown", function(e) { e.preventDefault(); selectMode(btn.dataset.mode); });
})(modeBtns[mi]);
function toggleSound() {
  soundOn = !soundOn;
  var lbl = soundOn ? "&#128264; " + L.soundOn : "&#128263; " + L.soundOff;
  $$("sndBtn").innerHTML = lbl; $$("menuSnd").innerHTML = lbl;
}
$$("sndBtn").addEventListener("pointerdown", function(e) { e.preventDefault(); toggleSound(); });
$$("menuSnd").addEventListener("pointerdown", function(e) { e.preventDefault(); toggleSound(); });

swipeX0 = 0; swipeY0 = 0; swiping = false;
can.addEventListener("touchstart", function(e) {
  e.preventDefault();
  if (state !== "play") return;
  var t = e.touches[0]; swipeX0 = t.clientX; swipeY0 = t.clientY; swiping = true;
}, {passive: false});
can.addEventListener("touchmove", function(e) {
  e.preventDefault();
  if (!swiping || state !== "play") return;
  var t = e.touches[0], dx = t.clientX - swipeX0, dy = t.clientY - swipeY0;
  if (Math.abs(dx) > cs * 0.9 && Math.abs(dx) > Math.abs(dy)) {
    moveH(dx > 0 ? 1 : -1); swipeX0 = t.clientX; swipeY0 = t.clientY;
  }
  if (dy > cs * 0.9 && Math.abs(dy) > Math.abs(dx)) {
    if (piece && !collides(piece.row + 1, piece.col, piece.cells)) { piece.row++; addScore(1); }
    swipeX0 = t.clientX; swipeY0 = t.clientY;
  }
}, {passive: false});
can.addEventListener("touchend", function(e) { e.preventDefault(); swiping = false; }, {passive: false});

document.addEventListener("contextmenu", function(e) { e.preventDefault(); });
window.addEventListener("wheel", function(e) { e.preventDefault(); }, {passive: false});

document.addEventListener("touchmove", function(e) { e.preventDefault(); }, {passive: false});
document.addEventListener("touchstart", function(e) { if (e.target !== can) e.preventDefault(); }, {passive: false});


document.addEventListener("visibilitychange", function() {
  if (document.hidden) { if (actx && actx.state === "running") actx.suspend(); }
  else { if (actx && actx.state === "suspended" && soundOn) actx.resume(); }
});

state = "start"; particles = []; shakeX = 0; shakeY = 0; flashA = 0; flashRing = 0;
grid = makeGrid();
$$("sndBtn").style.display = "none";
var t0 = 0;
function loop(t) {
  var dt = (t - t0) / 1000; t0 = t;
  if (state === "play" && !paused) { update(dt); updateDAS(dt); tickFlashHints(dt); }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(function(t) { t0 = t; loop(t); });
boot();
</script>
</body>
