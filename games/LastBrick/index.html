  const g = ctx.createLinearGradient(-d.w / 2, -d.h / 2, d.w / 2, d.h / 2);
  g.addColorStop(0, d.color);
  g.addColorStop(1, d.dark);
  ctx.fillStyle = g;

  if (d.shape === 'splinter') {
    ctx.beginPath();
    ctx.moveTo(-d.w / 2, 0);
    ctx.lineTo(d.w / 2, -d.h / 2);
    ctx.lineTo(d.w / 2, d.h / 2);
    ctx.closePath();
    ctx.fill();
  } else if (d.shape === 'shard') {
    ctx.beginPath();
    ctx.moveTo(0, -d.h / 2);
    ctx.lineTo(d.w / 2, d.h / 4);
    ctx.lineTo(-d.w / 3, d.h / 2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  } else if (d.shape === 'metal') {
    ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(-d.w / 2, -d.h / 2, d.w, 2);
  } else {
    ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
    if (d.shape === 'concrete') {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(-d.w / 4, -d.h / 4, 2, 2);
    }
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 0.8;
  if (d.shape !== 'splinter' && d.shape !== 'shard') ctx.strokeRect(-d.w / 2, -d.h / 2, d.w, d.h);
  ctx.restore();
}

function drawBallAimOverlay() {
  if (!animData || animData.type !== 'ball' || animData.phase !== 'aim') return;
  const a = animData;
  const crane = getCraneSetup(a.player, a.targetRail, true);
  const px = crane.jibEndX;
  const py = crane.jibEndY;
  const bx = px + Math.cos(a.angle) * a.ropeLen;
  const by = py + Math.sin(a.angle) * a.ropeLen;
  const col = a.player === 1 ? P1_COLOR : P2_COLOR;

  ctx.strokeStyle = col;
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.globalAlpha = 0.45;
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(bx, by);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  ctx.fillStyle = col;
  ctx.font = 'bold 12px Rajdhani, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.round(a.ropeLen)}px rope`, bx, by - 20);
}

function drawAllCranes() {
  for (const p of [1, 2]) {
    const rail = getDisplayRailOffset(p);
    const ballActive = animData?.type === 'ball' && animData.player === p;
    const crane = getCraneSetup(p, rail, ballActive);
    const active = currentPlayer === p;
    let opts = {};

    if (ballActive) {
      opts = { ballAngle: animData.angle, ballRopeLen: animData.ropeLen, active: true };
    } else if (animData?.type === 'crane' && animData.player === p && animData.phase === 'drop') {
      crane.targetX = animData.targetX;
      opts = { hookY: animData.hookY, active: true };
    } else if (active) {
      opts = { active: true };
    }

    ctx.globalAlpha = active ? 1 : 0.3;
    drawCrane(crane, opts);
    ctx.globalAlpha = 1;
  }
}

function render() {
  ctx.save();
  let sx = 0, sy = 0;
  if (shake > 0) {
    sx = (Math.random() - 0.5) * shake;
    sy = (Math.random() - 0.5) * shake;
    ctx.translate(sx, sy);
  }

  drawBackground();
  drawRails();
  drawSideZones();
  if (state === 'PLAYING' || state === 'WIN') drawAllCranes();
  drawBallAimOverlay();

  // Ground shadow under building
  if (gridW > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath();
    ctx.ellipse(buildingOrigin.x + gridW * CELL / 2, groundY + 2, gridW * CELL * 0.52, 10, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Building blocks
  blocks.forEach(b => {
    if (!b.alive) return;
    if (b.falling) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.rot);
      drawBlock(b, 0, 0, CELL - 4);
      ctx.restore();
    } else {
      const pos = gridToWorld(b.gx, b.gy);
      drawBlock(b, pos.x, pos.y);
    }
  });

  // Debris pile (draw before building for depth when behind — draw after blocks actually)
  debris.forEach(d => drawDebrisPiece(d));

  // Explosions
  explosions.forEach(e => {
    const prog = 1 - e.life / e.maxLife;
    const r = e.maxRadius * (0.25 + prog * 0.75);
    const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
    g.addColorStop(0, `rgba(255,220,100,${0.85 * (1 - prog * 0.5)})`);
    g.addColorStop(0.35, `rgba(255,120,40,${0.55 * (1 - prog)})`);
    g.addColorStop(0.7, `rgba(255,60,10,${0.25 * (1 - prog)})`);
    g.addColorStop(1, 'rgba(255,50,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Shockwave rings
  shockwaves.forEach(sw => {
    const prog = 1 - sw.life / sw.maxLife;
    const alpha = (1 - prog) * 0.55;
    ctx.strokeStyle = `rgba(255,240,200,${alpha})`;
    ctx.lineWidth = 3 + prog * 4;
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255,120,50,${alpha * 0.5})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, sw.radius * 0.92, 0, Math.PI * 2);
    ctx.stroke();
  });

  // Pending explosive fuses
  pendingExplosions.forEach(e => {
    ctx.fillStyle = '#ff4757';
    ctx.beginPath();
    ctx.arc(e.x, e.y, 6 + Math.sin(Date.now() * 0.02) * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#f7c948';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(e.x, e.y - 8);
    for (let i = 0; i < 5; i++) {
      ctx.lineTo(e.x + (i % 2 ? 4 : -4), e.y - 8 - i * 4);
    }
    ctx.stroke();
  });

  // Worker + attack target line
  if (animData && animData.type === 'worker') {
    drawWorker(animData);
    const target = getBlock(animData.gx, animData.gy);
    if (target && animData.phase === 'work') {
      const tp = gridToWorld(animData.gx, animData.gy);
      ctx.strokeStyle = animData.player === 1 ? P1_COLOR : P2_COLOR;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(animData.x + (animData.player === 1 ? 10 : -10), animData.y - 14);
      ctx.lineTo(tp.x + (animData.player === 1 ? -CELL * 0.4 : CELL * 0.4), tp.y);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / (p.maxLife || 1));
    if (p.type === 'confetti') {
      ctx.fillStyle = p.color;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.life * 5);
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    } else if (p.type === 'dust') {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'spark') {
      ctx.fillStyle = p.color;
      ctx.shadowColor = '#f7c948';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size * 0.7);
    }
    ctx.globalAlpha = 1;
  });

  ctx.restore();

  // Flash overlay
  if (flash > 0) {
    ctx.fillStyle = `rgba(255,220,150,${flash * 0.5})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ── Input ──
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

canvas.addEventListener('mousemove', e => {
  pointer = { ...pointer, ...getPos(e) };
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  pointer = { ...pointer, ...getPos(e) };
}, { passive: false });

canvas.addEventListener('wheel', e => {
  if (animData?.type === 'ball' && animData.phase === 'aim') {
    const maxRope = getMaxBallRope(animData.player, animData.targetRail);
    animData.ropeLen = Math.max(BALL_ROPE_MIN, Math.min(maxRope, animData.ropeLen + e.deltaY * 0.25));
    animData.ropeFromScroll = true;
    e.preventDefault();
  }
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  ensureAudio();
  if (animData?.type === 'ball' && animData.phase === 'aim') releaseWreckingBall();
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  ensureAudio();
  pointer = { ...pointer, ...getPos(e) };
}, { passive: false });

window.addEventListener('keydown', e => {
  keysDown[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') {
    if (animData?.type === 'ball' && animData.phase === 'aim') {
      e.preventDefault();
      releaseWreckingBall();
    }
  }
});
window.addEventListener('keyup', e => { keysDown[e.key] = false; });

if (ballStrikeBtn) ballStrikeBtn.addEventListener('click', () => releaseWreckingBall());

// ── Loop ──
let lastTime = 0;
function loop(t) {
  const dt = Math.min((t - lastTime) / 1000, 0.05);
  lastTime = t;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// Init
resize();
initTopbarLogo();
showMainMenu();
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
