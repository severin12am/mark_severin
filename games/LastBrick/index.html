<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LastBrick — Demolition Duel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0d1117; color: #e8ecf0;
    font-family: 'Rajdhani', system-ui, sans-serif;
    touch-action: none; user-select: none;
  }
  #wrap { width: 100%; height: 100%; display: flex; flex-direction: column; }
  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
    border-bottom: 2px solid #30363d; flex-shrink: 0; gap: 12px; flex-wrap: wrap;
  }
  #logo {
    display: flex; align-items: center; gap: 10px; min-height: 36px;
  }
  #logo .brand-logo {
    height: 34px; width: auto; display: none;
  }
  #logo .brand-logo.ok { display: block; }
  #logo .brand-text {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px;
    background: linear-gradient(135deg, #ff6b35, #f7c948);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  #logo:has(.brand-logo.ok) .brand-text { display: none; }
  #turn-badge {
    padding: 6px 18px; border-radius: 6px; font-weight: 700; font-size: 16px;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
  }
  #turn-badge.p1 { background: linear-gradient(135deg, #ff4757, #c0392b); color: #fff; }
  #turn-badge.p2 { background: linear-gradient(135deg, #2ed573, #1e8449); color: #fff; }
  #integrity-wrap { flex: 1; min-width: 120px; max-width: 280px; }
  #integrity-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
  #integrity-bar {
    height: 10px; background: #21262d; border-radius: 5px; overflow: hidden;
    border: 1px solid #30363d; margin-top: 4px;
  }
  #integrity-fill {
    height: 100%; width: 100%; border-radius: 4px;
    background: linear-gradient(90deg, #ff6b35, #f7c948);
    transition: width 0.4s ease;
  }
  #level-label { font-size: 13px; color: #8b949e; font-weight: 600; }
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
  #tool-panel {
    display: flex; gap: 6px; padding: 10px 12px; overflow-x: auto;
    background: linear-gradient(0deg, #161b22 0%, #0d1117 100%);
    border-top: 2px solid #30363d; flex-shrink: 0;
    scrollbar-width: thin; scrollbar-color: #484f58 #21262d;
  }
  .tool-btn {
    flex: 0 0 auto; width: 88px; padding: 8px 6px; border: 2px solid #30363d;
    border-radius: 10px; background: #21262d; color: #c9d1d9; cursor: pointer;
    transition: all 0.15s; text-align: center; position: relative;
  }
  .tool-btn:hover:not(:disabled) { border-color: #58a6ff; transform: translateY(-2px); }
  .tool-btn.active { border-color: #f7c948; background: #2d333b; box-shadow: 0 0 16px rgba(247,201,72,0.3); }
  .tool-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .tool-icon { font-size: 26px; line-height: 1; display: block; margin-bottom: 4px; }
  .tool-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .tool-desc { font-size: 9px; color: #8b949e; margin-top: 2px; line-height: 1.2; }
  .tool-uses { position: absolute; top: 4px; right: 6px; font-size: 10px; color: #f7c948; font-weight: 700; }
  #overlay {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,107,53,0.12) 0%, transparent 55%),
      radial-gradient(circle at 15% 85%, rgba(46,213,115,0.06) 0%, transparent 40%),
      radial-gradient(circle at 85% 75%, rgba(255,71,87,0.08) 0%, transparent 35%),
      rgba(0,0,0,0.88);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(8px);
    overflow-y: auto; padding: 24px 12px;
  }
  #overlay.hidden { display: none; }
  .panel {
    background: linear-gradient(145deg, #1c2128, #161b22);
    border: 2px solid #30363d; border-radius: 16px; padding: 32px 40px;
    max-width: 520px; width: 92%; text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .panel.panel-wide { max-width: 760px; padding: 28px 32px 32px; }
  .menu-brand { margin-bottom: 4px; }
  .menu-logo {
    max-width: min(380px, 88%); max-height: 148px; margin: 0 auto 6px;
    display: block; object-fit: contain; filter: drop-shadow(0 8px 24px rgba(255,107,53,0.25));
  }
  .menu-logo.hidden { display: none; }
  .menu-tagline {
    font-size: 17px; color: #8b949e; font-weight: 500; margin-bottom: 6px; line-height: 1.4;
  }
  .menu-sub {
    font-size: 13px; color: #6e7681; text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 22px;
  }
  .menu-badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    background: rgba(247,201,72,0.12); border: 1px solid rgba(247,201,72,0.35);
    color: #f7c948; font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 20px;
  }
  .menu-levels-heading {
    font-size: 13px; color: #6e7681; text-transform: uppercase; letter-spacing: 2px;
    margin: 4px 0 10px; text-align: left;
  }
  .menu-levels-heading span { color: #f7c948; }
  .panel h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 4px;
    background: linear-gradient(135deg, #ff6b35, #f7c948);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px;
  }
  .panel h2 { font-size: 18px; color: #8b949e; font-weight: 500; margin-bottom: 24px; }
  .panel p { color: #c9d1d9; line-height: 1.6; margin-bottom: 16px; font-size: 15px; text-align: left; }
  .panel ul { text-align: left; color: #8b949e; margin: 0 0 20px 20px; font-size: 14px; line-height: 1.7; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 8px; }
  .btn {
    padding: 12px 28px; border: none; border-radius: 8px; font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #ff6b35, #e85d04); color: #fff;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .btn-secondary { background: #21262d; color: #c9d1d9; border: 2px solid #30363d; }
  .btn-secondary:hover { border-color: #58a6ff; }
  .level-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; margin: 16px 0; text-align: left;
  }
  .level-card {
    padding: 14px 14px 12px; border: 2px solid #30363d; border-radius: 12px;
    background: linear-gradient(160deg, #21262d 0%, #1a1f26 100%);
    color: #c9d1d9; cursor: pointer; transition: all 0.15s;
    font-family: 'Rajdhani', sans-serif; text-align: left;
  }
  .level-card:hover { border-color: #f7c948; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(247,201,72,0.12); }
  .level-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .level-card .lv-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #f7c948; line-height: 1; }
  .level-card .lv-stars { font-size: 11px; color: #f7c948; letter-spacing: 1px; opacity: 0.85; }
  .level-card .lv-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: #e8ecf0; }
  .level-card .lv-desc { font-size: 12px; color: #8b949e; line-height: 1.35; margin-bottom: 8px; min-height: 2.7em; }
  .level-card .lv-meta {
    font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.8px;
    padding-top: 8px; border-top: 1px solid #30363d;
  }
  .win-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 3px;
    color: #f7c948; margin-bottom: 12px; animation: pulse 1s ease infinite alternate;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.04); } }
  #hint {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(22,27,34,0.85); padding: 6px 16px; border-radius: 20px;
    font-size: 13px; color: #8b949e; pointer-events: none; border: 1px solid #30363d;
    white-space: nowrap; max-width: 92%; overflow: hidden; text-overflow: ellipsis;
  }
  #ball-strike-btn {
    display: none; position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
    z-index: 5; padding: 10px 32px; border: none; border-radius: 8px;
    font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    background: linear-gradient(135deg, #ff4757, #c0392b); color: #fff;
    box-shadow: 0 4px 24px rgba(255,71,87,0.45);
  }
  #ball-strike-btn:hover { filter: brightness(1.1); transform: translateX(-50%) translateY(-2px); }
  @media (max-width: 600px) {
    #logo .brand-text { font-size: 22px; }
    .tool-btn { width: 76px; }
    .panel { padding: 24px 20px; }
    .panel h1 { font-size: 40px; }
    .level-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <div id="logo">
      <img class="brand-logo" src="logo.png" alt="">
      <span class="brand-text">LAST BRICK</span>
    </div>
    <div id="turn-badge" class="p1">Player 1's Turn</div>
    <div id="integrity-wrap">
      <div id="integrity-label">Structural Integrity</div>
      <div id="integrity-bar"><div id="integrity-fill"></div></div>
    </div>
    <div id="level-label">Level 1 — Wood Shed</div>
  </div>
  <div id="canvas-wrap">
    <canvas id="game"></canvas>
    <button id="ball-strike-btn" type="button">Strike!</button>
    <div id="hint">Pick a tool — your worker deploys automatically</div>
  </div>
  <div id="tool-panel"></div>
</div>

<div id="overlay">
  <div class="panel" id="menu-panel"></div>
</div>

<script>
(() => {
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const menuPanel = document.getElementById('menu-panel');
const toolPanel = document.getElementById('tool-panel');
const turnBadge = document.getElementById('turn-badge');
const integrityFill = document.getElementById('integrity-fill');
const levelLabel = document.getElementById('level-label');
const hintEl = document.getElementById('hint');
const ballStrikeBtn = document.getElementById('ball-strike-btn');

let CELL = 28;
const GRAVITY = 1200;
const MAX_DEBRIS = 140;
const MAX_PARTICLES = 220;
const BALL_MASS = 920;
const P1_COLOR = '#ff4757';
const P2_COLOR = '#2ed573';
let shockwaves = [];

const MATERIALS = {
  wood: {
    hp: 3, color: '#c4a574', dark: '#8b6914', mid: '#a08040', label: 'Wood', density: 0.6, debrisCount: 8,
    dmgMod: { hammer: 1.3, crowbar: 1.6, ball: 1.2, drill: 1.0, tnt: 1.4, charge: 1.3, crane: 1.1 },
    sideSupport: 0.4, splinter: true, debrisKind: 'splinter', restitution: 0.22, friction: 0.72,
  },
  brick: {
    hp: 6, color: '#b55239', dark: '#7a2e1f', mid: '#9a4030', label: 'Brick', density: 1.0, debrisCount: 6,
    dmgMod: { hammer: 0.9, crowbar: 0.6, ball: 1.1, drill: 0.85, tnt: 1.0, charge: 1.1, crane: 1.0 },
    sideSupport: 1.0, debrisKind: 'chunk', restitution: 0.18, friction: 0.82,
  },
  stone: {
    hp: 9, color: '#78716c', dark: '#57534e', mid: '#68625c', label: 'Stone', density: 1.4, debrisCount: 5,
    dmgMod: { hammer: 0.5, crowbar: 0.4, ball: 0.8, drill: 0.7, tnt: 0.85, charge: 1.0, crane: 0.9 },
    sideSupport: 1.5, foundation: true, debrisKind: 'chunk', restitution: 0.12, friction: 0.88,
  },
  concrete: {
    hp: 11, color: '#9ca3af', dark: '#6b7280', mid: '#848b96', label: 'Concrete', density: 1.3, debrisCount: 7,
    dmgMod: { hammer: 0.35, crowbar: 0.25, ball: 0.7, drill: 1.5, tnt: 0.75, charge: 0.9, crane: 0.85 },
    sideSupport: 1.3, debrisKind: 'concrete', restitution: 0.14, friction: 0.85,
  },
  steel: {
    hp: 16, color: '#64748b', dark: '#334155', mid: '#4b5c6e', label: 'Steel', density: 1.8, debrisCount: 4,
    dmgMod: { hammer: 0.15, crowbar: 0.1, ball: 0.5, drill: 0.55, tnt: 0.6, charge: 1.2, crane: 0.7 },
    sideSupport: 2.5, spark: true, debrisKind: 'metal', restitution: 0.08, friction: 0.92,
  },
  glass: {
    hp: 1, color: '#a5d8ff', dark: '#74c0fc', mid: '#bde4ff', label: 'Glass', density: 0.3, debrisCount: 12,
    dmgMod: { hammer: 2.0, crowbar: 2.5, ball: 2.0, drill: 2.0, tnt: 3.0, charge: 3.0, crane: 2.0 },
    sideSupport: 0, shatter: true, debrisKind: 'shard', restitution: 0.35, friction: 0.55,
  },
};

const LEVELS = [
  { name: 'Wood Shed', desc: 'A rickety timber shack — perfect for learning demolition.', difficulty: 1, materials: 'Wood & brick', cols: 7, rows: 15, mat: 'wood', roof: true, mixed: true },
  { name: 'Brick House', desc: 'Sturdy brick walls with wooden framing. Stone resists light hits.', difficulty: 2, materials: 'Wood & brick', cols: 10, rows: 7, mat: 'brick', mix: ['wood','brick'], roof: true },
  { name: 'Apartment', desc: 'Mixed materials and a reinforced core. Plan your support strikes.', difficulty: 3, materials: 'Wood, brick, concrete', cols: 12, rows: 9, mat: 'brick', mix: ['wood','brick','concrete'], roof: true, core: true },
  { name: 'Concrete Tower', desc: 'Heavy concrete and steel beams. Bring explosives and heavy tools.', difficulty: 4, materials: 'Brick, concrete, steel', cols: 11, rows: 11, mat: 'concrete', mix: ['brick','concrete','steel'], core: true },
  { name: 'Steel Skyscraper', desc: 'The ultimate gauntlet — steel pillars and a towering facade.', difficulty: 5, materials: 'Concrete & steel', cols: 13, rows: 14, mat: 'steel', mix: ['concrete','steel'], core: true, pillars: true },
];

const TOOLS = [
  { id: 'hammer', icon: '🔨', name: 'Sledgehammer', desc: 'Precise hit', dmg: 3, radius: 0, shake: 4, sfx: 'hit' },
  { id: 'crowbar', icon: '🪛', name: 'Crowbar', desc: 'Pry weak blocks', dmg: 4, radius: 0, pierce: true, shake: 3, sfx: 'hit' },
  { id: 'ball', icon: '⚙️', name: 'Wrecking Ball', desc: 'Roll in, aim, strike', dmg: 6, radius: 2.5, swing: true, shake: 12, sfx: 'heavy' },
  { id: 'drill', icon: '🔩', name: 'Jackhammer', desc: 'Rapid area drill', dmg: 2, radius: 1.5, rapid: true, shake: 6, sfx: 'drill' },
  { id: 'tnt', icon: '🧨', name: 'TNT', desc: 'Timed explosion', dmg: 8, radius: 3, explosive: true, shake: 18, sfx: 'explode' },
  { id: 'charge', icon: '💣', name: 'Heavy Charge', desc: 'Massive blast', dmg: 12, radius: 4.5, explosive: true, shake: 28, sfx: 'explodeBig' },
  { id: 'crane', icon: '🏗️', name: 'Demo Crane', desc: 'Column destroyer', dmg: 20, radius: 0, column: true, maxUses: 2, shake: 22, sfx: 'heavy' },
];

// ── Audio ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSfx(type) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);

  if (type === 'hit') {
    const o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(120 + Math.random() * 80, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.08);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(g); o.start(t); o.stop(t + 0.12);
    // noise burst
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.2, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    src.connect(ng); ng.connect(audioCtx.destination);
    src.start(t);
  } else if (type === 'heavy') {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(60, t);
    o.frequency.exponentialRampToValueAtTime(25, t + 0.25);
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g); o.start(t); o.stop(t + 0.35);
  } else if (type === 'drill') {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(180 + Math.random() * 40, t);
    g.gain.setValueAtTime(0.06, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    o.connect(g); o.start(t); o.stop(t + 0.05);
  } else if (type === 'explode' || type === 'explodeBig') {
    const vol = type === 'explodeBig' ? 0.35 : 0.22;
    const dur = type === 'explodeBig' ? 0.6 : 0.4;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.setValueAtTime(type === 'explodeBig' ? 800 : 1200, t);
    filt.frequency.exponentialRampToValueAtTime(80, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(filt); filt.connect(g);
    src.start(t);
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(80, t);
    o.frequency.exponentialRampToValueAtTime(30, t + 0.3);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(vol * 0.5, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    o.connect(og); og.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.4);
  } else if (type === 'win') {
    [440, 554, 659, 880].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'triangle';
      o.frequency.value = f;
      const gg = audioCtx.createGain();
      gg.gain.setValueAtTime(0, t + i * 0.12);
      gg.gain.linearRampToValueAtTime(0.12, t + i * 0.12 + 0.05);
      gg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.4);
      o.connect(gg); gg.connect(audioCtx.destination);
      o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.5);
    });
  } else if (type === 'crumble') {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) * 0.5;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    g.gain.setValueAtTime(0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    src.connect(g); src.start(t);
  }
}

// ── State ──
let W, H, dpr = 1;
let state = 'MENU';
let currentLevel = 0;
let currentPlayer = 1;
let blocks = [];
let debris = [];
let particles = [];
let explosions = [];
let pendingExplosions = [];
let totalBlocksStart = 0;
let lastDamager = 0;
let shake = 0;
let flash = 0;
let slowMo = 1;
let slowMoTimer = 0;
let craneUses = { 1: 2, 2: 2 };
let animating = false;
let animData = null;
let winCelebration = 0;
let pointer = { x: 0, y: 0, down: false };
let keysDown = {};
let buildingOrigin = { x: 0, y: 0 };
let gridW = 0, gridH = 0;
let groundY = 0;

let craneRailOffset = { 1: 0, 2: 0 };

function getLeftmostGx(gy) {
  for (let gx = 0; gx < gridW; gx++) if (getBlock(gx, gy)) return gx;
  return -1;
}

function getRightmostGx(gy) {
  for (let gx = gridW - 1; gx >= 0; gx--) if (getBlock(gx, gy)) return gx;
  return -1;
}

function isBlockExposedToPlayer(block, player) {
  if (!block || !block.alive || block.falling) return false;
  if (player === 1) return getLeftmostGx(block.gy) === block.gx;
  return getRightmostGx(block.gy) === block.gx;
}

function getWorkerAttackRow() {
  return Math.max(0, gridH - 2);
}

function getFaceGxAtRow(player, gy) {
  return player === 1 ? getLeftmostGx(gy) : getRightmostGx(gy);
}

function getExposedFaceBlockAtRow(player, gy) {
  const gx = getFaceGxAtRow(player, gy);
  if (gx < 0) return null;
  const block = getBlock(gx, gy);
  if (block && isBlockExposedToPlayer(block, player)) return { gx, gy, block };
  return null;
}

function getAutoWorkerTarget(player) {
  const chestRow = getWorkerAttackRow();
  for (let gy = chestRow; gy >= 0; gy--) {
    const hit = getExposedFaceBlockAtRow(player, gy);
    if (hit) return hit;
  }
  return getExposedFaceBlockAtRow(player, gridH - 1);
}

function getAnimatedRailOffset(anim, player) {
  if (!anim || anim.player !== player) return null;
  if (anim.phase === 'rails') {
    const prog = Math.min(1, anim.t / anim.railDuration);
    const ease = prog * (2 - prog);
    return anim.startRail + (anim.targetRail - anim.startRail) * ease;
  }
  if (anim.type === 'ball' || anim.type === 'crane') return anim.targetRail;
  return null;
}

function computeCellSize() {
  const availH = H - 100;
  const availW = W - 220;
  const byH = availH / (gridH + 1);
  const byW = availW / (gridW + 8);
  return Math.min(30, Math.max(12, Math.min(byH, byW)));
}

const CRANE_JIB_LEN = 148;
const CRANE_FACE_GAP = 54;
const BALL_ROPE_MIN = 90;
const BALL_ROPE_MAX = 400;

function getCraneMastTopY() {
  return Math.max(120, buildingOrigin.y - 60);
}

function getRequiredRailToFace(player) {
  if (player === 1) {
    const jibX = buildingOrigin.x - CRANE_FACE_GAP;
    return Math.max(0, jibX - CRANE_JIB_LEN - getCraneBaseHomeX(1));
  }
  const jibX = buildingOrigin.x + gridW * CELL + CRANE_FACE_GAP;
  const baseX = jibX + CRANE_JIB_LEN;
  return Math.max(0, getCraneBaseHomeX(2) - baseX);
}

function getCraneRailMax() {
  const need = Math.max(getRequiredRailToFace(1), getRequiredRailToFace(2));
  return need + 80;
}

function getCraneHomeRail() {
  return 0;
}

function getCraneBaseHomeX(player) {
  return player === 1 ? 36 : W - 36;
}

function getCranePivotY(forBall) {
  const mastH = getCraneMastTopY();
  if (!forBall) return mastH + 28;
  // Wrecking-ball jib runs out near the top of the tower
  return mastH + 14;
}

function getCraneClosestRail(player) {
  return getRequiredRailToFace(player);
}

function getMaxBallRope(player, railOffset) {
  const crane = getCraneSetup(player, railOffset, true);
  const verticalReach = groundY - crane.jibEndY - 6;
  return Math.min(BALL_ROPE_MAX, Math.max(BALL_ROPE_MIN + 40, verticalReach + 80));
}

function computeCraneTargetRail(player, worldX) {
  const railMax = getCraneRailMax();
  const closest = getCraneClosestRail(player);
  let rail;
  if (player === 1) {
    rail = worldX - CRANE_JIB_LEN - getCraneBaseHomeX(1);
  } else {
    rail = getCraneBaseHomeX(2) - (worldX + CRANE_JIB_LEN);
  }
  return Math.max(closest, Math.min(railMax, rail));
}

function initBallAimDefaults(a) {
  const crane = getCraneSetup(a.player, a.targetRail, true);
  const faceGx = getFaceGxAtRow(a.player, getWorkerAttackRow());
  const faceX = faceGx >= 0
    ? gridToWorld(faceGx, getWorkerAttackRow()).x
    : (a.player === 1 ? buildingOrigin.x : buildingOrigin.x + gridW * CELL);
  const faceY = buildingOrigin.y + getWorkerAttackRow() * CELL + CELL / 2;
  const dx = faceX - crane.jibEndX;
  const dy = faceY - crane.jibEndY;
  const maxRope = getMaxBallRope(a.player, a.targetRail);
  a.angle = Math.atan2(dy, dx);
  a.ropeLen = Math.max(BALL_ROPE_MIN, Math.min(maxRope, Math.hypot(dx, dy)));
}

function showBallStrikeUI() {
  if (ballStrikeBtn) ballStrikeBtn.style.display = 'block';
}

function hideBallStrikeUI() {
  if (ballStrikeBtn) ballStrikeBtn.style.display = 'none';
}

function enterBallAimPhase(a) {
  a.targetRail = getCraneClosestRail(a.player);
  craneRailOffset[a.player] = a.targetRail;
  a.phase = 'aim';
  a.t = 0;
  initBallAimDefaults(a);
  showBallStrikeUI();
  setActionHint('Move cursor to aim • scroll = rope length • ← → slide crane • Strike when ready');
}

function updateBallAim(a, dt) {
  const railSpeed = 200;
  if (keysDown.ArrowLeft || keysDown.a || keysDown.A) {
    a.targetRail = Math.max(0, a.targetRail - railSpeed * dt);
    craneRailOffset[a.player] = a.targetRail;
  }
  if (keysDown.ArrowRight || keysDown.d || keysDown.D) {
    a.targetRail = Math.min(getCraneRailMax(), a.targetRail + railSpeed * dt);
    craneRailOffset[a.player] = a.targetRail;
  }

  const crane = getCraneSetup(a.player, a.targetRail, true);
  const dx = pointer.x - crane.jibEndX;
  const dy = pointer.y - crane.jibEndY;
  const dist = Math.hypot(dx, dy);
  const maxRope = getMaxBallRope(a.player, a.targetRail);
  if (dist > 55) {
    a.angle = Math.atan2(dy, dx);
    if (!a.ropeFromScroll) a.ropeLen = Math.max(BALL_ROPE_MIN, Math.min(maxRope, dist));
  }
  a.ropeFromScroll = false;
}

function releaseWreckingBall() {
  if (!animData || animData.type !== 'ball' || animData.phase !== 'aim') return;
  const a = animData;
  hideBallStrikeUI();
  const crane = getCraneSetup(a.player, a.targetRail, true);
  const faceX = a.player === 1 ? buildingOrigin.x : buildingOrigin.x + gridW * CELL;
  a.strikeAngle = Math.atan2((groundY - 50) - crane.jibEndY, faceX - crane.jibEndX);
  if (a.player === 1) a.releaseSign = a.angle >= a.strikeAngle ? -1 : 1;
  else a.releaseSign = a.angle <= a.strikeAngle ? 1 : -1;
  const windUp = Math.abs(Math.sin(a.angle - a.strikeAngle));
  a.angVel = a.releaseSign * (5.5 + windUp * 7);
  a.phase = 'release';
  a.t = 0;
  a.hit = false;
  setActionHint('Swing!');
}

function startWreckingBallDeploy(tool) {
  const target = getAutoWorkerTarget(currentPlayer);
  if (!target) { rejectNoTarget(); return; }
  const player = currentPlayer;
  const targetRail = getCraneClosestRail(player);

  animating = true;
  hideBallStrikeUI();
  animData = {
    type: 'ball', tool, player,
    phase: 'rails', t: 0, railDuration: 0.9,
    startRail: getCraneHomeRail(),
    targetRail,
    ropeLen: 160,
    angle: 0,
    angVel: 0, hit: false,
  };
}

function wreckingBallImpactsBuilding(bx, by, player, pivotX, pivotY) {
  if (Math.hypot(bx - pivotX, by - pivotY) < 50) return false;
  const bLeft = buildingOrigin.x;
  const bRight = buildingOrigin.x + gridW * CELL;
  const bTop = buildingOrigin.y + 12;
  if (by < bTop || by > groundY) return false;
  if (player === 1) return bx >= bLeft - CELL * 0.2;
  return bx <= bRight + CELL * 0.2;
}

function getCraneSetup(player, railOffset, forBall) {
  const ground = groundY;
  const mastH = getCraneMastTopY();
  const offset = railOffset !== undefined ? railOffset : craneRailOffset[player];
  const clamped = Math.max(0, Math.min(getCraneRailMax(), offset));
  const jibY = getCranePivotY(!!forBall);

  if (player === 1) {
    const baseX = getCraneBaseHomeX(1) + clamped;
    return {
      player: 1, baseX, baseY: ground, color: P1_COLOR, railOffset: clamped,
      mastTopX: baseX, mastTopY: mastH, forBall: !!forBall,
      jibEndX: baseX + CRANE_JIB_LEN, jibEndY: jibY,
      ropeLen: Math.max(140, ground - jibY + 10),
    };
  }
  const baseX = getCraneBaseHomeX(2) - clamped;
  return {
    player: 2, baseX, baseY: ground, color: P2_COLOR, railOffset: clamped,
    mastTopX: baseX, mastTopY: mastH, forBall: !!forBall,
    jibEndX: baseX - CRANE_JIB_LEN, jibEndY: jibY,
    ropeLen: Math.max(140, ground - jibY + 10),
  };
}

function getDisplayRailOffset(player) {
  if (animData) {
    const rail = getAnimatedRailOffset(animData, player);
    if (rail !== null) return rail;
  }
  return craneRailOffset[player];
}

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  const wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (state === 'PLAYING' || state === 'WIN') repositionBuilding();
}
window.addEventListener('resize', resize);

function repositionBuilding() {
  CELL = computeCellSize();
  const bw = gridW * CELL;
  const bh = gridH * CELL + 20;
  buildingOrigin.x = (W - bw) / 2;
  buildingOrigin.y = H - bh - 50;
  groundY = buildingOrigin.y + gridH * CELL + 10;
}

function gridToWorld(gx, gy) {
  return { x: buildingOrigin.x + gx * CELL + CELL / 2, y: buildingOrigin.y + gy * CELL + CELL / 2 };
}

function worldToGrid(wx, wy) {
  const gx = Math.floor((wx - buildingOrigin.x) / CELL);
  const gy = Math.floor((wy - buildingOrigin.y) / CELL);
  return { gx, gy };
}

function getBlock(gx, gy) {
  return blocks.find(b => b.alive && !b.falling && b.gx === gx && b.gy === gy);
}

function pickMaterial(lv, gx, gy) {
  const rows = lv.rows, cols = lv.cols;
  if (gy === rows - 1) return lv.mixed ? 'stone' : (lv.mat === 'wood' ? 'stone' : lv.mat);
  if (lv.pillars && (gx === 0 || gx === cols - 1)) return 'steel';
  if (lv.roof && gy < 2) return lv.mix ? lv.mix[0] : 'wood';
  if (lv.mixed && gy === rows - 2 && (gx === 0 || gx === cols - 1)) return 'brick';
  if (lv.mixed && gy > 2 && gy < rows - 3 && (gx === 1 || gx === cols - 2) && gy % 3 === 1) return 'glass';
  if (lv.mixed && gy > rows - 5 && gy < rows - 1 && gx >= 2 && gx <= cols - 3) return 'brick';
  if (lv.mix) {
    const edge = gx === 0 || gx === cols - 1 || gy === 0;
    if (edge) return lv.mix[0];
    if (lv.core && gx >= cols * 0.35 && gx <= cols * 0.65) return lv.mix[lv.mix.length - 1];
    return lv.mix[Math.floor(Math.random() * lv.mix.length)];
  }
  return lv.mat;
}

function getToolDmgKey(tool) {
  if (tool.id === 'hammer') return 'hammer';
  if (tool.id === 'crowbar') return 'crowbar';
  if (tool.id === 'ball') return 'ball';
  if (tool.id === 'drill') return 'drill';
  if (tool.id === 'tnt') return 'tnt';
  if (tool.id === 'charge') return 'charge';
  if (tool.id === 'crane') return 'crane';
  return 'hammer';
}

function calcDamage(block, tool, baseDmg) {
  const mat = MATERIALS[block.mat];
  const key = getToolDmgKey(tool);
  const mod = mat.dmgMod[key] ?? 1;
  return Math.max(mat.shatter ? baseDmg * 2 : 1, Math.ceil(baseDmg * mod));
}

function buildLevel(levelIdx) {
  const lv = LEVELS[levelIdx];
  blocks = [];
  debris = [];
  particles = [];
  explosions = [];
  shockwaves = [];
  pendingExplosions = [];
  gridW = lv.cols;
  gridH = lv.rows;
  repositionBuilding();

  for (let gy = 0; gy < lv.rows; gy++) {
    for (let gx = 0; gx < lv.cols; gx++) {
      let mat = pickMaterial(lv, gx, gy);
      const m = MATERIALS[mat];
      blocks.push({
        gx, gy, mat, hp: m.hp, maxHp: m.hp,
        alive: true, falling: false, settled: false,
        x: 0, y: 0, vx: 0, vy: 0, rot: 0, vr: 0,
        w: CELL - 2, h: CELL - 2,
        wobble: 0,
      });
    }
  }
  totalBlocksStart = blocks.length;
  craneUses = { 1: 2, 2: 2 };
  craneRailOffset = { 1: 0, 2: 0 };
  updateIntegrityUI();
  buildToolPanel();
}

function countAliveBlocks() {
  return blocks.filter(b => b.alive && !b.falling).length;
}

function updateIntegrityUI() {
  const alive = countAliveBlocks();
  const pct = totalBlocksStart ? (alive / totalBlocksStart) * 100 : 0;
  integrityFill.style.width = pct + '%';
  levelLabel.textContent = `Level ${currentLevel + 1} — ${LEVELS[currentLevel].name}`;
}

function updateTurnUI() {
  turnBadge.textContent = `Player ${currentPlayer}'s Turn`;
  turnBadge.className = currentPlayer === 1 ? 'p1' : 'p2';
}

function buildToolPanel() {
  toolPanel.innerHTML = '';
  TOOLS.forEach(tool => {
    const btn = document.createElement('button');
    btn.className = 'tool-btn';
    btn.dataset.id = tool.id;
    let usesHtml = '';
    if (tool.maxUses) {
      const left = craneUses[currentPlayer];
      usesHtml = `<span class="tool-uses">${left}</span>`;
      if (left <= 0) btn.disabled = true;
    }
    btn.innerHTML = `${usesHtml}<span class="tool-icon">${tool.icon}</span><span class="tool-name">${tool.name}</span><span class="tool-desc">${tool.desc}</span>`;
    if (animating) btn.disabled = true;
    btn.addEventListener('click', () => activateTool(tool.id));
    toolPanel.appendChild(btn);
  });
}

function updateHint() {
  hintEl.textContent = currentPlayer === 1
    ? 'Pick a tool — your worker deploys from the left'
    : 'Pick a tool — your worker deploys from the right';
}

function activateTool(toolId) {
  if (animating || state !== 'PLAYING') return;
  const tool = TOOLS.find(t => t.id === toolId);
  if (!tool) return;
  if (tool.maxUses && craneUses[currentPlayer] <= 0) return;
  ensureAudio();

  if (tool.id === 'hammer') {
    deployMeleeWorker('hammer', tool);
  } else if (tool.id === 'crowbar') {
    deployMeleeWorker('crowbar', tool);
  } else if (tool.id === 'drill') {
    deployMeleeWorker('drill', tool);
  } else if (tool.explosive) {
    deployMeleeWorker('tnt', tool);
  } else if (tool.column) {
    const target = getAutoWorkerTarget(currentPlayer);
    if (!target) { rejectNoTarget(); return; }
    hintEl.textContent = 'Crane rolling into position...';
    useCrane(target.gx, tool);
  } else if (tool.swing) {
    setActionHint('Crane rolling into position...');
    startWreckingBallDeploy(tool);
  }
}

function difficultyStars(n) {
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function menuLogoBlock() {
  return `<div class="menu-brand">
    <img class="menu-logo" src="logo.png" alt="Last Brick">
    <h1 class="menu-logo-fallback">LAST BRICK</h1>
  </div>`;
}

function bindMenuLogo() {
  const img = menuPanel.querySelector('.menu-logo');
  const fallback = menuPanel.querySelector('.menu-logo-fallback');
  if (!img || !fallback) return;
  const showFallback = () => { img.classList.add('hidden'); fallback.style.display = 'block'; };
  const showLogo = () => { img.classList.remove('hidden'); fallback.style.display = 'none'; };
  if (img.complete && img.naturalWidth > 0) showLogo();
  else if (img.complete) showFallback();
  img.onload = showLogo;
  img.onerror = showFallback;
}

function initTopbarLogo() {
  const img = document.querySelector('#logo .brand-logo');
  if (!img) return;
  const ok = () => img.classList.add('ok');
  if (img.complete && img.naturalWidth > 0) ok();
  img.onload = ok;
  img.onerror = () => img.remove();
}

function showOverlay(html, wide) {
  menuPanel.classList.toggle('panel-wide', !!wide);
  menuPanel.innerHTML = html;
  overlay.classList.remove('hidden');
  bindMenuLogo();
}

function hideOverlay() {
  overlay.classList.add('hidden');
  menuPanel.classList.remove('panel-wide');
}

function levelCardsHtml() {
  return LEVELS.map((lv, i) =>
    `<button type="button" class="level-card" data-lv="${i}">
      <div class="level-card-head">
        <span class="lv-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="lv-stars" title="Difficulty">${difficultyStars(lv.difficulty)}</span>
      </div>
      <div class="lv-name">${lv.name}</div>
      <div class="lv-desc">${lv.desc}</div>
      <div class="lv-meta">${lv.cols}×${lv.rows} · ${lv.materials}</div>
    </button>`
  ).join('');
}

function bindLevelCards() {
  document.querySelectorAll('.level-card').forEach(b => {
    b.onclick = () => startGame(parseInt(b.dataset.lv, 10));
  });
}

function showMainMenu() {
  state = 'MENU';
  showOverlay(`
    ${menuLogoBlock()}
    <p class="menu-tagline">Demolition Duel — whoever drops the final brick wins.</p>
    <div class="menu-badge">2 Players · Local Hotseat</div>
    <p class="menu-levels-heading">Choose a level · <span>5 sites</span></p>
    <div class="level-grid">${levelCardsHtml()}</div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-howto">How to Play</button>
    </div>
  `, true);
  bindLevelCards();
  bindMenuButtons();
}

function showHowTo() {
  showOverlay(`
    ${menuLogoBlock()}
    <h2 style="margin-bottom:16px;font-size:22px;color:#e8ecf0;font-weight:700;">How to Play</h2>
    <p>Two players take turns demolishing a building. The player who destroys the <strong>last block</strong> wins!</p>
    <ul>
      <li>Player 1 attacks the <strong>left face</strong>, Player 2 the <strong>right face</strong></li>
      <li>You can only hit <strong>exposed outer blocks</strong> on your side of the tower</li>
      <li>Each turn, <strong>pick a tool</strong> — workers run automatically; the wrecking ball lets you aim first</li>
      <li><strong>Wrecking ball:</strong> crane rolls in → move cursor to set angle & length, scroll to fine-tune rope, ← → to slide crane, then <strong>Strike!</strong></li>
      <li>Materials behave differently: wood splinters, stone resists hammers, steel needs heavy tools, glass shatters instantly</li>
      <li>Destroy supports and unsupported sections collapse with gravity</li>
      <li>Five levels — from wood shed to steel skyscraper</li>
    </ul>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-back">Back</button>
    </div>
  `);
  document.getElementById('btn-back').onclick = showMainMenu;
}

function bindMenuButtons() {
  const h = document.getElementById('btn-howto');
  if (h) h.onclick = showHowTo;
}

function startGame(levelIdx) {
  ensureAudio();
  hideBallStrikeUI();
  currentLevel = levelIdx;
  currentPlayer = 1;
  lastDamager = 0;
  shake = 0; flash = 0; slowMo = 1; winCelebration = 0;
  animating = false;
  state = 'PLAYING';
  hideOverlay();
  buildLevel(levelIdx);
  updateTurnUI();
  updateHint();
  resize();
}

function endTurn() {
  animating = false;
  animData = null;
  craneRailOffset[currentPlayer] = getCraneHomeRail();
  if (countAliveBlocks() <= 0) {
    buildToolPanel();
    return;
  }
  currentPlayer = currentPlayer === 1 ? 2 : 1;
  updateTurnUI();
  buildToolPanel();
  updateHint();
}

function checkWin() {
  const alive = countAliveBlocks();
  updateIntegrityUI();
  if (alive <= 0 && state === 'PLAYING') {
    state = 'WIN';
    winCelebration = 3;
    playSfx('win');
    shake = 20;
    setTimeout(showWinScreen, 1200);
  }
}

function showWinScreen() {
  const winner = lastDamager || currentPlayer;
  const color = winner === 1 ? P1_COLOR : P2_COLOR;
  showOverlay(`
    <div class="win-title">BUILDING DESTROYED!</div>
    <h2 style="color:${color};font-size:28px;font-weight:700;margin-bottom:8px;">Player ${winner} Wins!</h2>
    <p style="text-align:center;color:#8b949e;">Level ${currentLevel + 1}: ${LEVELS[currentLevel].name}</p>
    <div class="btn-row" style="margin-top:24px;">
      <button class="btn btn-primary" id="btn-replay">Play Again</button>
      <button class="btn btn-secondary" id="btn-next" ${currentLevel >= LEVELS.length - 1 ? 'disabled style="opacity:0.4"' : ''}>Next Level</button>
      <button class="btn btn-secondary" id="btn-menu">Main Menu</button>
    </div>
  `);
  document.getElementById('btn-replay').onclick = () => startGame(currentLevel);
  document.getElementById('btn-next').onclick = () => { if (currentLevel < LEVELS.length - 1) startGame(currentLevel + 1); };
  document.getElementById('btn-menu').onclick = showMainMenu;
}

// ── Damage & Physics ──
function trimDebris() {
  while (debris.length > MAX_DEBRIS) debris.shift();
}

function trimParticles() {
  while (particles.length > MAX_PARTICLES) particles.shift();
}

function getCrackLevel(block) {
  if (!block.maxHp) return 0;
  const ratio = block.hp / block.maxHp;
  if (ratio > 0.75) return 0;
  if (ratio > 0.5) return 1;
  if (ratio > 0.25) return 2;
  return 3;
}

function spawnDustCloud(x, y, radius, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * radius;
    particles.push({
      x: x + Math.cos(angle) * dist, y: y + Math.sin(angle) * dist,
      vx: Math.cos(angle) * (20 + Math.random() * 60),
      vy: -30 - Math.random() * 80,
      life: 0.6 + Math.random() * 0.9, maxLife: 1.2,
      size: 3 + Math.random() * 7,
      color: color || '#8b949e', type: 'dust', gravity: 18 + Math.random() * 25,
    });
  }
  trimParticles();
}

function createDebrisPiece(x, y, mat, kind, impulse) {
  const m = MATERIALS[mat];
  const ix = impulse?.x || 0;
  const iy = impulse?.y || 0;
  const power = impulse?.power || 1;
  let w, h, shape;
  if (kind === 'splinter') {
    w = 3 + Math.random() * 14; h = 2 + Math.random() * 5; shape = 'splinter';
  } else if (kind === 'shard') {
    w = 2 + Math.random() * 7; h = 2 + Math.random() * 9; shape = 'shard';
  } else if (kind === 'metal') {
    w = 8 + Math.random() * 14; h = 4 + Math.random() * 8; shape = 'metal';
  } else if (kind === 'concrete') {
    w = 5 + Math.random() * 12; h = 5 + Math.random() * 10; shape = 'concrete';
  } else {
    w = 6 + Math.random() * 11; h = 5 + Math.random() * 9; shape = 'chunk';
  }
  const angle = impulse?.angle ?? (Math.random() * Math.PI * 2);
  const speed = (80 + Math.random() * 220) * power;
  return {
    x, y, w, h, shape, mat,
    vx: ix + Math.cos(angle) * speed + (Math.random() - 0.5) * 80,
    vy: iy + Math.sin(angle) * speed - 60 - Math.random() * 120,
    rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 12,
    color: m.color, dark: m.dark, mid: m.mid || m.color,
    life: 2.5 + Math.random() * 3,
    density: m.density || 1,
    bounciness: m.restitution ?? 0.2,
    friction: m.friction ?? 0.75,
    settled: false,
  };
}

function spawnMaterialDebris(x, y, mat, count, impulse) {
  const m = MATERIALS[mat];
  const kind = m.debrisKind || 'chunk';
  const n = count || m.debrisCount || 4;
  for (let i = 0; i < n; i++) {
    const piece = createDebrisPiece(
      x + (Math.random() - 0.5) * CELL * 0.6,
      y + (Math.random() - 0.5) * CELL * 0.4,
      mat, kind,
      impulse ? { ...impulse, angle: impulse.angle ?? Math.random() * Math.PI * 2, power: (impulse.power || 1) * (0.7 + Math.random() * 0.6) } : null
    );
    debris.push(piece);
  }
  trimDebris();
}

function spawnDebris(x, y, mat, count) {
  spawnMaterialDebris(x, y, mat, count || MATERIALS[mat].debrisCount || 4);
}

function impulseDebrisAndBlocks(x, y, radius, force, damager) {
  const r = radius;
  debris.forEach(d => {
    const dx = d.x - x, dy = d.y - y;
    const dist = Math.hypot(dx, dy);
    if (dist > r || dist < 1) return;
    const falloff = 1 - dist / r;
    const f = force * falloff * falloff;
    d.vx += (dx / dist) * f;
    d.vy += (dy / dist) * f - f * 0.35;
    d.vr += (Math.random() - 0.5) * f * 0.04;
    d.settled = false;
  });
  blocks.forEach(b => {
    if (!b.alive) return;
    const pos = b.falling ? { x: b.x, y: b.y } : gridToWorld(b.gx, b.gy);
    const dx = pos.x - x, dy = pos.y - y;
    const dist = Math.hypot(dx, dy);
    if (dist > r || dist < 1) return;
    const falloff = 1 - dist / r;
    const f = force * falloff * 0.45;
    if (b.falling) {
      b.vx += (dx / dist) * f;
      b.vy += (dy / dist) * f - f * 0.25;
    }
  });
}

function damageBlock(block, dmg, damager, tool, impactPos) {
  if (!block || !block.alive || block.falling) return;
  const actual = tool ? calcDamage(block, tool, dmg) : dmg;
  const prevCrack = getCrackLevel(block);
  block.hp -= actual;
  block.wobble = Math.min(1.2, block.wobble + 0.35 + actual * 0.08);
  lastDamager = damager;
  const mat = MATERIALS[block.mat];
  const pos = block.falling ? { x: block.x, y: block.y } : gridToWorld(block.gx, block.gy);
  const newCrack = getCrackLevel(block);
  if (newCrack > prevCrack) {
    spawnParticles(block, mat.splinter ? 5 : 3, mat.spark ? 'spark' : 'chip');
    if (newCrack >= 2) spawnDustCloud(pos.x, pos.y, CELL * 0.4, 4, '#9ca3af');
  }
  if (block.hp <= 0) {
    destroyBlock(block, impactPos || pos, tool);
  } else {
    spawnParticles(block, mat.spark ? 6 : 4, mat.spark ? 'spark' : 'chip');
    if (actual >= 3) spawnDustCloud(pos.x, pos.y, CELL * 0.25, 2);
  }
}

function destroyBlock(block, impactPos, tool) {
  block.alive = false;
  const pos = impactPos || (block.falling ? { x: block.x, y: block.y } : gridToWorld(block.gx, block.gy));
  const mat = MATERIALS[block.mat];
  const impulse = { x: 0, y: 0, power: 1.1, angle: Math.random() * Math.PI * 2 };

  if (mat.splinter) {
    spawnMaterialDebris(pos.x, pos.y, block.mat, mat.debrisCount + 2, impulse);
    spawnParticles(block, 10, 'chip');
    spawnDustCloud(pos.x, pos.y, CELL * 0.5, 5, '#c4a574');
    playSfx('crumble');
  } else if (mat.shatter) {
    spawnMaterialDebris(pos.x, pos.y, block.mat, mat.debrisCount, { ...impulse, power: 1.4 });
    spawnParticles(block, 14, 'shatter');
    playSfx('hit');
  } else if (mat.spark) {
    spawnMaterialDebris(pos.x, pos.y, block.mat, mat.debrisCount, { ...impulse, power: 0.85 });
    spawnParticles(block, 8, 'spark');
    spawnDustCloud(pos.x, pos.y, CELL * 0.35, 3, '#94a3b8');
    playSfx('heavy');
  } else {
    spawnMaterialDebris(pos.x, pos.y, block.mat, mat.debrisCount, impulse);
    spawnParticles(block, mat.debrisCount || 6, 'destroy');
    spawnDustCloud(pos.x, pos.y, CELL * 0.55, 6 + (mat.debrisKind === 'concrete' ? 4 : 0));
    playSfx('crumble');
  }
}

function spawnParticles(block, count, type) {
  const pos = block.falling
    ? { x: block.x, y: block.y }
    : gridToWorld(block.gx, block.gy);
  const m = MATERIALS[block.mat];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: pos.x + (Math.random() - 0.5) * CELL,
      y: pos.y + (Math.random() - 0.5) * CELL,
      vx: (Math.random() - 0.5) * (type === 'destroy' || type === 'shatter' ? 320 : 140),
      vy: (Math.random() - 0.5) * (type === 'destroy' || type === 'shatter' ? 320 : 140) - 80,
      life: 0.4 + Math.random() * 0.7,
      maxLife: 1,
      size: type === 'shatter' ? 1 + Math.random() * 3 : 2 + Math.random() * 4,
      color: type === 'spark' ? '#f7c948' : (type === 'shatter' ? '#a5d8ff' : (Math.random() > 0.5 ? m.color : m.dark)),
      type: type === 'dust' ? 'dust' : (type === 'spark' ? 'spark' : 'chip'),
      gravity: type === 'dust' ? 40 : (type === 'spark' ? 600 : 450),
    });
  }
  trimParticles();
}

function spawnExplosion(x, y, radius, tool, damager) {
  const blastR = radius * CELL;
  explosions.push({ x, y, radius: blastR * 0.3, maxRadius: blastR, life: 0.55, maxLife: 0.55, type: 'fire' });
  shockwaves.push({ x, y, radius: 8, maxRadius: blastR * 1.35, life: 0.42, maxLife: 0.42 });
  for (let i = 0; i < 36; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 120 + Math.random() * 340;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 120,
      life: 0.5 + Math.random() * 0.6, maxLife: 1,
      size: 3 + Math.random() * 7,
      color: Math.random() > 0.5 ? '#ff6b35' : '#f7c948',
      type: 'fire', gravity: 140,
    });
  }
  for (let i = 0; i < 28; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * blastR * 1.6,
      y: y + (Math.random() - 0.5) * blastR * 1.6,
      vx: (Math.random() - 0.5) * 120, vy: -50 - Math.random() * 100,
      life: 1 + Math.random() * 1.2, maxLife: 1.5,
      size: 5 + Math.random() * 10,
      color: '#8b949e', type: 'dust', gravity: 22,
    });
  }
  spawnMaterialDebris(x, y, 'brick', 6, { power: 1.8, angle: Math.random() * Math.PI * 2 });
  spawnMaterialDebris(x, y, 'concrete', 4, { power: 2.2, angle: Math.random() * Math.PI * 2 });
  const blastForce = tool.id === 'charge' ? 520 : (tool.id === 'tnt' ? 340 : 280);
  impulseDebrisAndBlocks(x, y, blastR * 1.2, blastForce, damager || currentPlayer);
  applyAreaDamage(x, y, radius, tool.dmg, damager || currentPlayer, tool);
  if (tool.shake) shake = Math.max(shake, tool.shake);
  flash = Math.max(flash, tool.id === 'charge' ? 0.45 : (tool.dmg > 0 ? 0.3 : 0.15));
  if (tool.dmg > 0) {
    slowMo = 0.28;
    slowMoTimer = tool.id === 'charge' ? 0.22 : 0.15;
  }
  if (tool.sfx) playSfx(tool.sfx);
  trimParticles();
}

function applyAreaDamage(cx, cy, radius, dmg, damager, tool) {
  const r = radius * CELL;
  blocks.forEach(block => {
    if (!block.alive || block.falling) return;
    const pos = gridToWorld(block.gx, block.gy);
    const dist = Math.hypot(pos.x - cx, pos.y - cy);
    if (dist <= r) {
      const falloff = Math.pow(1 - dist / r, 1.6);
      damageBlock(block, Math.max(1, Math.ceil(dmg * falloff)), damager, tool, { x: pos.x, y: pos.y });
    }
  });
}

function getBlockSideSupportStrength(b) {
  return MATERIALS[b.mat].sideSupport ?? 1;
}

function startBlockFalling(b) {
  b.falling = true;
  b.collapseMarked = true;
  const pos = gridToWorld(b.gx, b.gy);
  b.x = pos.x; b.y = pos.y;
  b.w = CELL - 2; b.h = CELL - 2;
  const mass = MATERIALS[b.mat].density || 1;
  b.vx = (Math.random() - 0.5) * 60;
  b.vy = -20 - Math.random() * 40;
  b.rot = (Math.random() - 0.5) * 0.25;
  b.vr = (Math.random() - 0.5) * (3 + mass);
  spawnParticles(b, 8, 'dust');
  spawnDustCloud(pos.x, pos.y, CELL * 0.45, 4);
  playSfx('crumble');
}

function checkStructuralIntegrity() {
  const supported = new Set();
  const key = (x, y) => x + ',' + y;

  blocks.forEach(b => {
    if (b.alive && !b.falling && b.gy === gridH - 1) supported.add(key(b.gx, b.gy));
  });

  let changed = true;
  let iter = 0;
  while (changed && iter++ < gridW * gridH) {
    changed = false;
    blocks.forEach(b => {
      if (!b.alive || b.falling) return;
      const k = key(b.gx, b.gy);
      if (supported.has(k)) return;
      if (supported.has(key(b.gx, b.gy + 1))) { supported.add(k); changed = true; return; }
      const left = getBlock(b.gx - 1, b.gy);
      const right = getBlock(b.gx + 1, b.gy);
      if (left && supported.has(key(b.gx - 1, b.gy)) && getBlockSideSupportStrength(left) >= 0.5) {
        supported.add(k); changed = true; return;
      }
      if (right && supported.has(key(b.gx + 1, b.gy)) && getBlockSideSupportStrength(right) >= 0.5) {
        supported.add(k); changed = true;
      }
    });
  }

  blocks.forEach(b => {
    if (!b.alive || b.falling) return;
    if (!supported.has(key(b.gx, b.gy))) startBlockFalling(b);
  });
}

function processCollapse() {
  const before = blocks.filter(b => b.alive && b.falling).length;
  checkStructuralIntegrity();
  const fallingNow = blocks.filter(b => b.alive && b.falling).length;
  const newFalls = fallingNow - before;
  if (newFalls > 2) {
    shake = Math.max(shake, 6 + newFalls * 1.8);
    if (newFalls > 6) { slowMo = 0.42; slowMoTimer = 0.14; }
  }
  updateIntegrityUI();
}

function rejectNoTarget() {
  animating = false;
  animData = null;
  buildToolPanel();
  if (countAliveBlocks() <= 0) return;
  hintEl.textContent = 'Nothing to hit on your face this turn — try again after the tower shifts.';
  setTimeout(updateHint, 2000);
}

function getWorkerStandX(player, gy) {
  gy = gy !== undefined ? gy : getWorkerAttackRow();
  const faceGx = getFaceGxAtRow(player, gy);
  if (faceGx < 0) {
    return player === 1 ? buildingOrigin.x - CELL * 0.6 : buildingOrigin.x + gridW * CELL + CELL * 0.6;
  }
  const pos = gridToWorld(faceGx, gy);
  return player === 1 ? pos.x - CELL * 0.9 : pos.x + CELL * 0.9;
}

function moveTowardX(current, target, speed, dt) {
  const dx = target - current;
  const absDx = Math.abs(dx);
  if (absDx < 0.01) return { x: current, arrived: true };
  const step = Math.min(speed * dt, absDx);
  return { x: current + Math.sign(dx) * step, arrived: step >= absDx - 0.01 };
}

function syncWorkerTarget(a) {
  const target = getAutoWorkerTarget(a.player);
  if (target) {
    a.gx = target.gx;
    a.gy = target.gy;
    a.targetX = getWorkerStandX(a.player, getWorkerAttackRow());
  }
  return target;
}

function startWorkerJob(workerType, tool) {
  const target = getAutoWorkerTarget(currentPlayer);
  if (!target) { rejectNoTarget(); return; }
  const standX = getWorkerStandX(currentPlayer, getWorkerAttackRow());
  const standY = groundY - 20;
  const startX = currentPlayer === 1 ? -50 : W + 50;
  animating = true;
  animData = {
    type: 'worker', workerType, player: currentPlayer, tool,
    gx: target.gx, gy: target.gy,
    phase: 'runIn', phaseTime: 0, totalTime: 0, frame: 0,
    x: startX, y: standY, targetX: standX,
    workTimer: 0, hits: 0,
    maxHits: workerType === 'hammer' || workerType === 'crowbar' ? 6 : 8,
  };
}

function deployMeleeWorker(workerType, tool) {
  setActionHint('Worker deploying...');
  startWorkerJob(workerType, tool);
}

function startExplosiveAt(gx, gy, tool, player) {
  const pos = gridToWorld(gx, gy);
  const offX = player === 1 ? -CELL * 0.55 : CELL * 0.55;
  pendingExplosions.push({ x: pos.x + offX, y: pos.y, tool, fuse: 1.0, gx, gy });
  playSfx('hit');
}

function useCrane(gx, tool) {
  animating = true;
  craneUses[currentPlayer]--;
  const player = currentPlayer;
  const targetX = gridToWorld(gx, getWorkerAttackRow()).x;
  const targetRail = computeCraneTargetRail(player, targetX);
  animData = {
    type: 'crane', tool, gx, targetX, targetRail, player,
    phase: 'rails', t: 0, railDuration: 0.9,
    startRail: getCraneHomeRail(),
    hookY: null,
  };
}

function setActionHint(text) {
  if (hintEl) hintEl.textContent = text;
}

function finishActionTurn() {
  processCollapse();
  checkWin();
  animData = null;
  hideBallStrikeUI();
  if (state === 'PLAYING') endTurn();
  else { animating = false; buildToolPanel(); }
}

function finishCraneStrike(gx, tool) {
  let hitAny = false;
  blocks.forEach(b => {
    if (b.alive && !b.falling && b.gx === gx) {
      damageBlock(b, tool.dmg, currentPlayer, tool);
      hitAny = true;
    }
  });
  if (hitAny) {
    shake = tool.shake;
    flash = 0.25;
    playSfx(tool.sfx);
    const pos = gridToWorld(gx, Math.floor(gridH / 2));
    spawnExplosion(pos.x, pos.y, 1.2, { dmg: 0, sfx: 'heavy', shake: 0 }, currentPlayer);
  }
  finishActionTurn();
}

function finishWorkerTurn() {
  finishActionTurn();
}

function updateWorkerAnim(a, dt) {
  a.totalTime = (a.totalTime || 0) + dt;
  a.frame += dt;
  a.phaseTime = (a.phaseTime || 0) + dt;

  if (a.totalTime > 15) {
    if (a.workerType === 'tnt' && pendingExplosions.length > 0) {
      animData = { type: 'fuse', totalTime: a.totalTime };
    } else {
      finishWorkerTurn();
    }
    return;
  }

  if (a.phase === 'runIn') {
    setActionHint('Worker running in...');
    const move = moveTowardX(a.x, a.targetX, 400, dt);
    a.x = move.x;
    if (move.arrived) {
      a.phase = 'work';
      a.phaseTime = 0;
      a.swingT = 0;
      syncWorkerTarget(a);
    } else if (a.phaseTime > 4) {
      // Stuck guard — begin work from current position, no teleport
      a.phase = 'work';
      a.phaseTime = 0;
      a.swingT = 0;
      syncWorkerTarget(a);
    }
    return;
  }

  if (a.phase === 'work') {
    a.workTimer += dt;
    const target = syncWorkerTarget(a);

    if (a.workerType === 'hammer' || a.workerType === 'crowbar') {
      setActionHint('Working...');
      a.swingT = (a.swingT || 0) + dt;
      if (a.swingT > 0.22) {
        a.swingT = 0;
        if (target) {
          const live = getBlock(target.gx, target.gy);
          if (live) {
            damageBlock(live, a.tool.dmg, a.player, a.tool);
            shake = Math.max(shake, a.tool.shake);
            playSfx(a.tool.sfx);
          }
          a.hits++;
        }
        if (!getAutoWorkerTarget(a.player) || a.hits >= a.maxHits || a.workTimer >= 1.2) {
          a.phase = 'runOut';
          a.phaseTime = 0;
        }
      }
    } else if (a.workerType === 'tnt') {
      setActionHint('Planting charge...');
      if (a.workTimer >= 0.8) {
        if (target) startExplosiveAt(target.gx, target.gy, a.tool, a.player);
        a.phase = 'runOut';
        a.phaseTime = 0;
      }
    } else if (a.workerType === 'drill') {
      setActionHint('Working...');
      a.swingT = (a.swingT || 0) + dt;
      if (a.swingT > 0.07) {
        a.swingT = 0;
        if (target) {
          const pos = gridToWorld(target.gx, target.gy);
          applyAreaDamage(pos.x, pos.y, a.tool.radius, a.tool.dmg, a.player, a.tool);
          a.hits++;
        }
        shake = Math.max(shake, 4);
        playSfx('drill');
      }
      if (!target || a.hits >= a.maxHits || a.workTimer >= 1.2) {
        a.phase = 'runOut';
        a.phaseTime = 0;
      }
    }
    return;
  }

  if (a.phase === 'runOut') {
    setActionHint(a.workerType === 'tnt' ? 'Clearing out...' : 'Worker heading back...');
    const exitX = a.player === 1 ? -60 : W + 60;
    const move = moveTowardX(a.x, exitX, 400, dt);
    a.x = move.x;
    if (move.arrived || a.phaseTime > 3) {
      if (a.workerType === 'tnt') {
        setActionHint('Fuse lit — stand back!');
        animData = { type: 'fuse', totalTime: a.totalTime };
      } else {
        finishWorkerTurn();
      }
    }
  }
}

function updateAnim(dt) {
  if (!animData) return;

  if (animData.type === 'worker') {
    updateWorkerAnim(animData, dt);
    return;
  }

  if (animData.type === 'ball') {
    const a = animData;
    a.t += dt;

    if (a.phase === 'rails') {
      setActionHint('Crane rolling into position...');
      if (a.t >= a.railDuration) enterBallAimPhase(a);
    } else if (a.phase === 'release') {
      const crane = getCraneSetup(a.player, a.targetRail, true);
      const pivotX = crane.jibEndX;
      const pivotY = crane.jibEndY;
      const L = Math.max(BALL_ROPE_MIN, a.ropeLen);
      const pendG = 980 / L;
      const sinTheta = Math.sin(a.angle - Math.PI / 2);
      a.angVel -= pendG * sinTheta * dt;
      a.angVel *= (1 - 0.0015 * dt * 60);
      a.angle += a.angVel * dt;
      const bx = pivotX + Math.cos(a.angle) * a.ropeLen;
      const by = pivotY + Math.sin(a.angle) * a.ropeLen;
      const tangentialSpeed = Math.abs(a.angVel * a.ropeLen);
      if (!a.hit && wreckingBallImpactsBuilding(bx, by, a.player, pivotX, pivotY)) {
        a.hit = true;
        const impactForce = tangentialSpeed * BALL_MASS / 800;
        const dmgMult = Math.min(2.4, 1 + impactForce * 0.12);
        const hitTool = { ...a.tool, dmg: Math.ceil(a.tool.dmg * dmgMult), shake: a.tool.shake + Math.min(8, impactForce * 0.4) };
        applyAreaDamage(bx, by, a.tool.radius, hitTool.dmg, a.player, hitTool);
        impulseDebrisAndBlocks(bx, by, a.tool.radius * CELL * 1.1, 180 + impactForce * 12, a.player);
        spawnDustCloud(bx, by, CELL * a.tool.radius, 8 + Math.floor(impactForce));
        spawnMaterialDebris(bx, by, 'stone', 3, { power: 1 + impactForce * 0.05, angle: a.angle + Math.PI });
        shake = Math.max(shake, hitTool.shake);
        playSfx(a.tool.sfx);
        flash = Math.max(flash, 0.15 + impactForce * 0.015);
        if (impactForce > 8) { slowMo = 0.35; slowMoTimer = 0.12; }
        a.angVel *= 0.15;
        a.phase = 'follow';
        a.t = 0;
      } else if (a.t > 3) {
        a.phase = 'follow';
        a.t = 0;
      }
    } else if (a.phase === 'follow') {
      const pendDamp = 0.965;
      a.angVel *= Math.pow(pendDamp, dt * 60);
      a.angle += a.angVel * dt;
      a.t += dt;
      if (a.t > 0.35) finishActionTurn();
    }
  }

  if (animData && animData.type === 'crane') {
    const a = animData;
    a.t += dt;
    if (a.phase === 'rails') {
      setActionHint('Demo crane rolling in...');
      if (a.t >= a.railDuration) {
        craneRailOffset[a.player] = a.targetRail;
        const crane = getCraneSetup(a.player, a.targetRail, false);
        a.hookY = crane.jibEndY + 30;
        a.phase = 'drop'; a.t = 0;
      }
    } else if (a.phase === 'drop') {
      setActionHint('Hook dropping...');
      a.hookY += dt * 420;
      if (a.hookY >= groundY - 24) {
        a.hookY = groundY - 24;
        a.phase = 'done';
        finishCraneStrike(a.gx, a.tool);
      }
    }
  }

  // Fuses (runs after worker hands off to fuse state)
  if (animData?.type === 'fuse') {
    animData.totalTime = (animData.totalTime || 0) + dt;
    if (animData.totalTime > 15) {
      pendingExplosions.length = 0;
      finishWorkerTurn();
      return;
    }
  }
  for (let i = pendingExplosions.length - 1; i >= 0; i--) {
    const e = pendingExplosions[i];
    e.fuse -= dt;
    if (e.fuse <= 0) {
      spawnExplosion(e.x, e.y, e.tool.radius, e.tool);
      pendingExplosions.splice(i, 1);
      if (pendingExplosions.length === 0 && animData && animData.type === 'fuse') {
        finishWorkerTurn();
      }
    }
  }
}

// ── Update ──
function update(dt) {
  if (slowMoTimer > 0) {
    slowMoTimer -= dt;
    if (slowMoTimer <= 0) slowMo = 1;
  }
  const sdt = dt * slowMo;

  if (state === 'WIN') {
    winCelebration -= dt;
    if (winCelebration > 0 && Math.random() < 0.3) {
      particles.push({
        x: W / 2 + (Math.random() - 0.5) * 200,
        y: H / 2 + (Math.random() - 0.5) * 100,
        vx: (Math.random() - 0.5) * 100, vy: -100 - Math.random() * 200,
        life: 1.5, maxLife: 1.5, size: 4 + Math.random() * 6,
        color: ['#ff6b35','#f7c948','#ff4757','#2ed573'][Math.floor(Math.random()*4)],
        type: 'confetti', gravity: 200,
      });
    }
  }

  if (state !== 'PLAYING' && state !== 'WIN') return;

  if (animData?.type === 'ball' && animData.phase === 'aim') {
    updateBallAim(animData, sdt);
  }

  updateAnim(sdt);

  // Falling blocks with gravity & collisions
  let collapseDirty = false;
  blocks.forEach(b => {
    if (!b.falling) {
      if (b.wobble > 0) b.wobble = Math.max(0, b.wobble - dt * 2.5);
      return;
    }
    const mass = MATERIALS[b.mat].density || 1;
    b.vy += GRAVITY * mass * sdt;
    b.x += b.vx * sdt;
    b.y += b.vy * sdt;
    b.rot += b.vr * sdt;
    b.vr *= 0.998;
    b.vx *= (1 - 0.08 * sdt);

    const halfH = (b.h || CELL - 2) / 2;
    const halfW = (b.w || CELL - 2) / 2;
    const mat = MATERIALS[b.mat];
    const bounce = mat.shatter ? 0.12 : (mat.restitution ?? 0.22);

    if (b.y + halfH > groundY) {
      b.y = groundY - halfH;
      if (Math.abs(b.vy) > 80) {
        spawnDustCloud(b.x, groundY - 4, halfW, 3);
        shake = Math.max(shake, Math.min(10, Math.abs(b.vy) * 0.04 * mass));
      }
      b.vy *= -bounce;
      b.vx *= mat.friction ?? 0.75;
      b.vr += b.vx * 0.015;
      if (Math.abs(b.vy) < 40 && Math.abs(b.vx) < 18) {
        b.falling = false;
        b.alive = false;
        spawnMaterialDebris(b.x, b.y, b.mat, 3, { power: 0.7 });
        collapseDirty = true;
      } else if (Math.abs(b.vy) > 30) {
        spawnParticles(b, 2, 'dust');
      }
    }

    blocks.forEach(other => {
      if (other === b || !other.alive || other.falling) return;
      const op = gridToWorld(other.gx, other.gy);
      if (Math.abs(b.x - op.x) < halfW + CELL / 2 && Math.abs(b.y - op.y) < halfH + CELL / 2 && b.vy > 0) {
        b.y = op.y - CELL / 2 - halfH;
        b.vy *= -0.15;
        b.vx *= 0.75;
        spawnParticles(b, 2, 'chip');
      }
    });
  });
  if (collapseDirty && !animating && pendingExplosions.length === 0) {
    processCollapse();
  }

  // Debris with gravity, friction, and pile-up
  for (let i = debris.length - 1; i >= 0; i--) {
    const d = debris[i];
    const mass = d.density || 1;
    d.vy += GRAVITY * mass * sdt * 0.95;
    d.x += d.vx * sdt;
    d.y += d.vy * sdt;
    d.rot += d.vr * sdt;
    d.life -= sdt;
    const bounce = d.bounciness || 0.2;
    const fric = d.friction || 0.7;
    d.vx *= (1 - 0.04 * sdt * 60);

    if (d.y + d.h / 2 > groundY) {
      d.y = groundY - d.h / 2;
      if (Math.abs(d.vy) > 60 && !d.settled) spawnDustCloud(d.x, groundY - 2, d.w * 0.5, 1);
      d.vy *= -bounce;
      d.vx *= fric;
      d.vr *= 0.85;
      if (Math.abs(d.vy) < 25 && Math.abs(d.vx) < 12) {
        d.vy = 0;
        d.vx *= 0.5;
        d.vr *= 0.7;
        d.settled = true;
      }
    }

    for (let j = i - 1; j >= 0; j--) {
      const o = debris[j];
      if (!o.settled && Math.abs(o.vy) > 30) continue;
      if (Math.abs(d.x - o.x) < (d.w + o.w) * 0.45 && Math.abs(d.y - o.y) < (d.h + o.h) * 0.5 && d.vy > 0) {
        d.y = o.y - o.h / 2 - d.h / 2 - 1;
        d.vy *= -bounce * 0.5;
        d.vx *= fric;
      }
    }

    if (d.life <= 0) debris.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vy += (p.gravity || 200) * sdt;
    p.x += p.vx * sdt;
    p.y += p.vy * sdt;
    p.life -= sdt;
    if (p.type === 'fire') p.size *= 0.98;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Explosions & shockwaves
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].life -= sdt;
    if (explosions[i].life <= 0) explosions.splice(i, 1);
  }
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const sw = shockwaves[i];
    sw.life -= sdt;
    sw.radius = sw.maxRadius * (1 - sw.life / sw.maxLife);
    if (sw.life <= 0) shockwaves.splice(i, 1);
  }

  if (shake > 0) shake = Math.max(0, shake - dt * 30);
  if (flash > 0) flash = Math.max(0, flash - dt * 2);

  // Re-check win after falling blocks settle
  if (state === 'PLAYING' && !animating && pendingExplosions.length === 0) {
    const falling = blocks.some(b => b.falling);
    if (!falling) checkWin();
  }
}

// ── Render ──
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a2332');
  grad.addColorStop(0.6, '#0d1117');
  grad.addColorStop(1, '#1a1f2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Distant city silhouette
  ctx.fillStyle = '#161b22';
  for (let i = 0; i < 12; i++) {
    const bx = i * (W / 10) - 20;
    const bh = 40 + (i * 17 % 80);
    ctx.fillRect(bx, H - 60 - bh, 50 + (i % 3) * 20, bh);
  }

  // Ground
  const gy = groundY || buildingOrigin.y + gridH * CELL + 10;
  const gg = ctx.createLinearGradient(0, gy, 0, H);
  gg.addColorStop(0, '#2d3748');
  gg.addColorStop(1, '#1a202c');
  ctx.fillStyle = gg;
  ctx.fillRect(0, gy, W, H - gy);

  // Ground detail
  ctx.strokeStyle = '#4a5568';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x + 20, H); ctx.stroke();
  }
}

function drawSideZones() {
  if (state !== 'PLAYING') return;
  const top = buildingOrigin.y - 10;
  const bot = groundY + 5;
  const autoTarget = !animating ? getAutoWorkerTarget(currentPlayer) : null;
  const workerTarget = (animData?.type === 'worker')
    ? { gx: animData.gx, gy: animData.gy }
    : autoTarget;

  blocks.forEach(b => {
    if (!b.alive || b.falling) return;
    const pos = gridToWorld(b.gx, b.gy);
    const p1Exp = isBlockExposedToPlayer(b, 1);
    const p2Exp = isBlockExposedToPlayer(b, 2);
    const isAttackTarget = workerTarget
      && b.gx === workerTarget.gx && b.gy === workerTarget.gy
      && ((currentPlayer === 1 && p1Exp) || (currentPlayer === 2 && p2Exp));
    if (isAttackTarget) {
      ctx.fillStyle = currentPlayer === 1 ? 'rgba(255,71,87,0.28)' : 'rgba(46,213,115,0.28)';
      ctx.fillRect(pos.x - CELL / 2, pos.y - CELL / 2, CELL, CELL);
    } else if (currentPlayer === 1 && p1Exp) {
      ctx.fillStyle = 'rgba(255,71,87,0.1)';
      ctx.fillRect(pos.x - CELL / 2, pos.y - CELL / 2, CELL, CELL);
    } else if (currentPlayer === 2 && p2Exp) {
      ctx.fillStyle = 'rgba(46,213,115,0.1)';
      ctx.fillRect(pos.x - CELL / 2, pos.y - CELL / 2, CELL, CELL);
    }
  });

  // Face approach zones
  ctx.fillStyle = currentPlayer === 1 ? 'rgba(255,71,87,0.04)' : 'rgba(46,213,115,0.04)';
  if (currentPlayer === 1) ctx.fillRect(0, top, buildingOrigin.x + CELL, bot - top);
  else ctx.fillRect(buildingOrigin.x + gridW * CELL - CELL, top, W - buildingOrigin.x - gridW * CELL + CELL, bot - top);
}

function drawRails() {
  if (state !== 'PLAYING' && state !== 'WIN') return;
  const y = groundY + 2;
  const leftStart = getCraneBaseHomeX(1) - 6;
  const leftEnd = buildingOrigin.x - CRANE_FACE_GAP - 12;
  const rightStart = buildingOrigin.x + gridW * CELL + CRANE_FACE_GAP + 12;
  const rightEnd = getCraneBaseHomeX(2) + 6;
  ctx.strokeStyle = '#4b5563';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(leftStart, y); ctx.lineTo(leftEnd, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(rightStart, y); ctx.lineTo(rightEnd, y);
  ctx.stroke();
  for (let x = leftStart; x < leftEnd; x += 18) {
    ctx.fillStyle = '#374151';
    ctx.fillRect(x, y - 2, 8, 4);
  }
  for (let x = rightStart; x < rightEnd; x += 18) {
    ctx.fillStyle = '#374151';
    ctx.fillRect(x, y - 2, 8, 4);
  }
}

function drawWorker(a) {
  const col = a.player === 1 ? P1_COLOR : P2_COLOR;
  const facing = a.player === 1 ? 1 : -1;
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.scale(facing, 1);

  const bob = a.phase === 'work' ? Math.abs(Math.sin(a.frame * 18)) * -3 : Math.sin(a.frame * 14) * 2;
  ctx.translate(0, bob);

  // Hard hat
  ctx.fillStyle = '#f7c948';
  ctx.beginPath();
  ctx.moveTo(-10, -30); ctx.lineTo(10, -30); ctx.lineTo(11, -24); ctx.lineTo(-11, -24);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(-11, -24, 22, 3);

  // Head
  ctx.fillStyle = '#d4a574';
  ctx.beginPath(); ctx.arc(0, -18, 8, 0, Math.PI * 2); ctx.fill();

  // Body / vest
  ctx.fillStyle = col;
  ctx.fillRect(-10, -10, 20, 18);
  ctx.fillStyle = '#374151';
  ctx.fillRect(-10, 8, 9, 12 + Math.sin(a.frame * 14) * 3);
  ctx.fillRect(1, 8, 9, 12 - Math.sin(a.frame * 14) * 3);

  if (a.workerType === 'hammer' || a.workerType === 'crowbar') {
    const swing = a.phase === 'work' ? Math.sin(a.frame * 18) * 1.2 - 0.6 : 0;
    ctx.save();
    ctx.translate(4, -6);
    ctx.rotate(swing);
    ctx.fillStyle = '#78350f';
    ctx.fillRect(0, -2, 22, 5);
    ctx.fillStyle = a.workerType === 'crowbar' ? '#94a3b8' : '#4b5563';
    ctx.fillRect(18, -6, 8, 12);
    ctx.restore();
  } else if (a.workerType === 'tnt') {
    ctx.fillStyle = '#ff4757';
    ctx.fillRect(10, -6, 10, 14);
    ctx.fillStyle = '#f7c948';
    ctx.fillRect(12, -10, 2, 5);
    ctx.fillRect(16, -10, 2, 5);
  } else if (a.workerType === 'drill') {
    ctx.fillStyle = '#6b7280';
    ctx.fillRect(8, -2, 20, 6);
    ctx.fillStyle = '#f7c948';
    ctx.fillRect(26, -1, 4, 4);
    if (a.phase === 'work') {
      ctx.fillStyle = 'rgba(200,200,200,0.4)';
      ctx.fillRect(28, -4, 6 + Math.random() * 4, 10);
    }
  }
  ctx.restore();
}

function drawCrane(crane, opts = {}) {
  const { ballAngle, ballRopeLen, hookY, active } = opts;
  const col = crane.color;
  const dark = crane.player === 1 ? '#b83232' : '#1a9f52';
  const p = crane.player;
  const sign = p === 1 ? 1 : -1;
  const bx = crane.baseX;
  const by = crane.baseY;
  const mastTop = crane.mastTopY;
  const jibX = crane.jibEndX;
  const jibY = crane.jibEndY;
  const alpha = active ? 1 : 0.72;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.ellipse(bx, by + 3, 30, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Rail carriage / chassis
  ctx.fillStyle = '#3a4049';
  ctx.fillRect(bx - 24, by - 16, 48, 16);
  ctx.fillStyle = '#525964';
  ctx.fillRect(bx - 22, by - 14, 44, 4);
  ctx.fillStyle = '#2a2f36';
  [-14, 0, 14].forEach(ox => {
    ctx.beginPath();
    ctx.arc(bx + ox, by - 3, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#1a1d22';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Counterweight block (rear of crane)
  ctx.fillStyle = '#4b5563';
  ctx.fillRect(bx - sign * 8, by - 42, sign * 22, 24);
  ctx.fillStyle = '#6b7280';
  ctx.fillRect(bx - sign * 6, by - 40, sign * 18, 4);

  // Mast — tapered tower with lattice hints
  const mastGrad = ctx.createLinearGradient(bx - 8, by, bx + 8, by);
  mastGrad.addColorStop(0, dark);
  mastGrad.addColorStop(0.5, col);
  mastGrad.addColorStop(1, dark);
  ctx.fillStyle = mastGrad;
  ctx.beginPath();
  ctx.moveTo(bx - 9, by - 16);
  ctx.lineTo(bx + 9, by - 16);
  ctx.lineTo(bx + 4, mastTop);
  ctx.lineTo(bx - 4, mastTop);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(0,0,0,0.22)';
  ctx.lineWidth = 1;
  for (let y = by - 28; y > mastTop + 10; y -= 20) {
    ctx.beginPath();
    ctx.moveTo(bx - 6, y);
    ctx.lineTo(bx + 6, y - 14);
    ctx.moveTo(bx + 6, y);
    ctx.lineTo(bx - 6, y - 14);
    ctx.stroke();
  }

  // Operator cab at mast head
  ctx.fillStyle = '#f0c040';
  ctx.fillRect(bx - 11, mastTop - 10, 22, 16);
  ctx.fillStyle = 'rgba(135,206,235,0.75)';
  ctx.fillRect(bx - 7 + sign * 3, mastTop - 6, 9, 7);
  ctx.strokeStyle = '#8a6914';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx - 11, mastTop - 10, 22, 16);

  // Jib boom — upper and lower chords
  const boomStartX = bx + sign * 10;
  const boomStartY = mastTop + 2;
  ctx.strokeStyle = col;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(boomStartX, boomStartY);
  ctx.lineTo(jibX, jibY);
  ctx.stroke();
  ctx.strokeStyle = dark;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(boomStartX, boomStartY + 8);
  ctx.lineTo(jibX, jibY + (crane.forBall ? 2 : 10));
  ctx.stroke();

  // Pendant / support line from mast peak to mid-jib
  ctx.strokeStyle = '#9ca3af';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  const midX = boomStartX + (jibX - boomStartX) * 0.62;
  const midY = boomStartY + (jibY - boomStartY) * 0.62;
  ctx.beginPath();
  ctx.moveTo(bx, mastTop - 6);
  ctx.lineTo(midX, midY);
  ctx.stroke();

  // Jib tip sheave
  const pivotX = jibX;
  const pivotY = jibY;
  ctx.fillStyle = '#374151';
  ctx.beginPath();
  ctx.arc(pivotX, pivotY, 5, 0, Math.PI * 2);
  ctx.fill();

  const ropeLen = ballRopeLen || crane.ropeLen;

  if (ballAngle != null) {
    const bax = pivotX + Math.cos(ballAngle) * ropeLen;
    const bay = pivotY + Math.sin(ballAngle) * ropeLen;
    // Rope / chain
    ctx.strokeStyle = '#6b7280';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(pivotX, pivotY);
    ctx.lineTo(bax, bay);
    ctx.stroke();
    // Chain links hint
    ctx.strokeStyle = '#9ca3af';
    ctx.lineWidth = 1;
    for (let i = 1; i < 5; i++) {
      const t = i / 5;
      const lx = pivotX + (bax - pivotX) * t;
      const ly = pivotY + (bay - pivotY) * t;
      ctx.strokeRect(lx - 3, ly - 2, 6, 4);
    }
    // Wrecking ball
    const ballR = 17;
    const ballGrad = ctx.createRadialGradient(bax - 5, bay - 6, 2, bax, bay, ballR);
    ballGrad.addColorStop(0, '#7a8490');
    ballGrad.addColorStop(0.55, '#4b5563');
    ballGrad.addColorStop(1, '#2d3239');
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(bax, bay, ballR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#1f2937';
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(bax + Math.cos(a) * (ballR - 4), bay + Math.sin(a) * (ballR - 4));
      ctx.lineTo(bax + Math.cos(a) * ballR, bay + Math.sin(a) * ballR);
      ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.arc(bax - 5, bay - 6, 5, 0, Math.PI * 2);
    ctx.fill();
  } else if (hookY != null) {
    ctx.strokeStyle = '#6b7280';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(pivotX, pivotY);
    ctx.lineTo(crane.targetX || pivotX, hookY);
    ctx.stroke();
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo((crane.targetX || pivotX) - 9, hookY);
    ctx.lineTo((crane.targetX || pivotX) + 9, hookY);
    ctx.lineTo((crane.targetX || pivotX), hookY + 12);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = dark;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else {
    ctx.strokeStyle = '#8b949e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(pivotX, pivotY);
    ctx.lineTo(pivotX + sign * 28, pivotY + ropeLen * 0.45);
    ctx.stroke();
    ctx.fillStyle = '#4b5563';
    ctx.beginPath();
    ctx.arc(pivotX + sign * 28, pivotY + ropeLen * 0.45, 12, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = alpha * 0.85;
  ctx.fillStyle = col;
  ctx.font = 'bold 10px Rajdhani, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('P' + p, bx, by + 20);
  ctx.restore();
}

function drawCrackOverlay(x, y, s, level) {
  if (level <= 0) return;
  ctx.strokeStyle = `rgba(0,0,0,${0.25 + level * 0.12})`;
  ctx.lineWidth = 1 + level * 0.3;
  const seeds = [
    [[0.2, 0.25, 0.45, 0.42, 0.65, 0.55], [0.3, 0.5, 0.55, 0.72, 0.75, 0.85]],
    [[0.75, 0.2, 0.55, 0.35, 0.35, 0.55], [0.8, 0.4, 0.6, 0.6, 0.45, 0.75]],
    [[0.5, 0.15, 0.35, 0.35, 0.2, 0.55], [0.55, 0.45, 0.7, 0.55, 0.85, 0.7]],
  ];
  for (let c = 0; c < Math.min(level, 3); c++) {
    const seg = seeds[c % seeds.length];
    ctx.beginPath();
    ctx.moveTo(x + s * seg[0][0], y + s * seg[0][1]);
    for (let i = 2; i < seg[0].length; i += 2) ctx.lineTo(x + s * seg[0][i], y + s * seg[0][i + 1]);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + s * seg[1][0], y + s * seg[1][1]);
    for (let i = 2; i < seg[1].length; i += 2) ctx.lineTo(x + s * seg[1][i], y + s * seg[1][i + 1]);
    ctx.stroke();
  }
}

function drawMaterialTexture(b, x, y, s) {
  const m = MATERIALS[b.mat];
  if (b.mat === 'wood') {
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(x + 2, y + s * i / 4);
      ctx.lineTo(x + s - 2, y + s * i / 4 + 1);
      ctx.stroke();
    }
  } else if (b.mat === 'brick') {
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 1;
    for (let row = 0; row < 3; row++) {
      const off = row % 2 ? s * 0.25 : 0;
      ctx.strokeRect(x + off, y + row * s / 3, s * 0.5, s / 3 - 1);
      ctx.strokeRect(x + off + s * 0.5, y + row * s / 3, s * 0.5, s / 3 - 1);
    }
  } else if (b.mat === 'concrete' || b.mat === 'stone') {
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    for (let i = 0; i < 6; i++) {
      ctx.fillRect(x + (i * 17 % s), y + (i * 11 % s), 2, 2);
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.strokeRect(x + 1, y + 1, s - 2, s - 2);
  } else if (b.mat === 'steel') {
    ctx.fillStyle = 'rgba(200,210,220,0.2)';
    ctx.fillRect(x + 2, y + s * 0.35, s - 4, s * 0.3);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(x, y, s, 2);
    ctx.fillRect(x, y, 2, s);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x + s - 2, y, 2, s);
    ctx.fillRect(x, y + s - 2, s, 2);
  }
}

function drawBlock(b, px, py, size) {
  const m = MATERIALS[b.mat];
  const wobble = b.wobble ? Math.sin(Date.now() * 0.04) * b.wobble * 3 : 0;
  const s = size || CELL - 2;
  const x = px - s / 2 + wobble;
  const y = py - s / 2;
  const crackLevel = getCrackLevel(b);

  // Drop shadow (light from top-left)
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.fillRect(x + 4, y + 5, s, s);

  // Body gradient
  const bg = ctx.createLinearGradient(x, y, x + s, y + s);
  bg.addColorStop(0, m.color);
  bg.addColorStop(0.55, m.mid || m.color);
  bg.addColorStop(1, m.dark);
  ctx.fillStyle = bg;

  if (b.mat === 'glass') {
    ctx.globalAlpha = 0.62;
    ctx.fillRect(x, y, s, s);
    ctx.globalAlpha = 1;
    const gl = ctx.createLinearGradient(x, y, x + s, y + s);
    gl.addColorStop(0, 'rgba(255,255,255,0.35)');
    gl.addColorStop(0.5, 'rgba(165,216,255,0.1)');
    gl.addColorStop(1, 'rgba(116,192,252,0.25)');
    ctx.fillStyle = gl;
    ctx.fillRect(x + 1, y + 1, s - 2, s - 2);
    ctx.strokeStyle = 'rgba(165,216,255,0.85)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x + 1, y + 1, s - 2, s - 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.moveTo(x + 3, y + 3); ctx.lineTo(x + s - 3, y + s - 3);
    ctx.moveTo(x + s - 3, y + 3); ctx.lineTo(x + 3, y + s - 3);
    ctx.stroke();
  } else {
    ctx.fillRect(x, y, s, s);
    drawMaterialTexture(b, x, y, s);
  }

  // Top-left highlight
  ctx.fillStyle = 'rgba(255,255,255,0.14)';
  ctx.fillRect(x, y, s, s * 0.28);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(x, y, s * 0.22, s);

  drawCrackOverlay(x, y, s, crackLevel);

  ctx.strokeStyle = 'rgba(0,0,0,0.28)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, s, s);
}

function drawDebrisPiece(d) {
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.rotate(d.rot);

  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(-d.w / 2 + 2, -d.h / 2 + 2, d.w, d.h);
