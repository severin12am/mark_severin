<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Severin — Living Portfolio</title>
  <link rel="stylesheet" href="css/styles-v3.css?v=2">
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="particle-field" id="particle-field"></div>
  </div>

  <header class="site-header">
    <div class="logo" id="site-title">Mark Severin</div>
    <div class="header-panel">
      <nav class="design-switcher" aria-label="Compare designs">
        <a class="design-switch-link" href="index-classic.html">Classic</a>
        <a class="design-switch-link" href="index-v2.html">Red</a>
        <a class="design-switch-link active" href="index.html">Living</a>
        <a class="design-switch-link" href="index-v4.html">X-Scroll</a>
        <a class="design-switch-link" href="index-v5.html">X-Fill</a>
      </nav>
      <div class="header-panel-divider" aria-hidden="true"></div>
      <nav class="nav-tabs">
        <button class="nav-tab active" data-target="games-section" data-i18n="games">Games</button>
        <button class="nav-tab" data-target="apps-section" data-i18n="apps">Apps</button>
        <div class="contact-menu" id="contact-menu">
          <button type="button" class="nav-tab contact-toggle" id="contact-toggle" aria-expanded="false" aria-controls="contact-dropdown" data-i18n="contact">Contact</button>
          <div class="contact-dropdown" id="contact-dropdown">
            <a class="contact-dropdown-link" href="https://x.com/StopMarkSeverin" target="_blank" rel="noopener noreferrer">@StopMarkSeverin on X</a>
            <a class="contact-dropdown-link" href="https://instagram.com/stopmarkseverin" target="_blank" rel="noopener noreferrer">@stopmarkseverin on insta</a>
            <a class="contact-dropdown-link" href="https://t.me/severrrin" target="_blank" rel="noopener noreferrer">@severrrin on tg</a>
            <a class="contact-dropdown-link" href="mailto:severrrrin@gmail.com">severrrrin@gmail.com</a>
          </div>
        </div>
        <div class="lang-switch" aria-label="Site language">
          <button class="lang-switch-btn" data-lang="ru" type="button">RU</button>
          <button class="lang-switch-btn" data-lang="en" type="button">EN</button>
        </div>
      </nav>
    </div>
  </header>

  <section class="hero-v3">
    <div class="hero-v3-copy">
      <h1 id="hero-title">
        <span class="hero-v3-line">Mark</span>
        <span class="hero-v3-line">Severin</span>
      </h1>
    </div>
  </section>

  <section class="formation-gap formation-gap--things" id="formation-things" aria-hidden="true"></section>

  <section class="formation-gap formation-gap--games" id="formation-games" aria-hidden="true"></section>

  <section class="section" id="games-section">
    <div class="grid" id="games-grid"></div>
  </section>

  <section class="formation-gap" id="formation-apps" aria-hidden="true"></section>

  <div class="server-banner" id="server-banner" hidden>
    For games to play correctly, use a local server — run <strong>start.bat</strong> or open
    <a href="http://localhost:3456">http://localhost:3456</a>
  </div>

  <section class="section" id="apps-section">
    <div class="section-inner">
      <div class="app-list" id="apps-list"></div>
    </div>
  </section>

  <div class="player-overlay" id="player">
    <div class="player-bar">
      <h3 id="player-title"></h3>
      <button class="modal-close" id="player-close" aria-label="Close game">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="player-frame-wrap">
      <iframe id="game-frame" title="Game player" allow="fullscreen; autoplay"></iframe>
    </div>
  </div>

  <script defer src="js/design-v3.js?v=18"></script>
  <script defer src="data/catalog.js"></script>
  <script defer src="js/portfolio.js"></script>
</body>
</html>
